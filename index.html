            { id: 'g22', cat: 'Geografi Kota', title: 'Day 22: Perencanaan Tata Ruang Kota & Manajemen Permukiman' },
            { id: 'g23', cat: 'Geografi Budaya', title: 'Day 23: Pariwisata Spasial, Manajemen Destinasi & Ekowisata' },
            { id: 'g24', cat: 'Geografi Budaya', title: 'Day 24: Geografi Budaya, Persebaran Etnolinguistik & Identitas' },
            { id: 'g25', cat: 'Kartografi', title: 'Day 25: Kartografi Dasar, Proyeksi Peta & Skala Distorsi' },
            { id: 'g26', cat: 'Kartografi', title: 'Day 26: Analisis Simbolisasi Peta Topografi & Kontur' },
            { id: 'g27', cat: 'Pemetaan Spasial', title: 'Day 27: Penginderaan Jauh, Citra Satelit & Foto Udara' },
            { id: 'g28', cat: 'Pemetaan Spasial', title: 'Day 28: Sistem Informasi Geografis (SIG), Vektor & Raster' },
            { id: 'g29', cat: 'Pemetaan Spasial', title: 'Day 29: Analisis Spasial Komputasional (Overlay & Buffering)' },
            { id: 'g30', cat: 'Pemetaan Spasial', title: 'Day 30: Integrasi Analisis Geospasial untuk Pemecahan Kasus' },
          ],
        };

        const FIELDS = [
          { id: 'ALL', label: 'Semua Bidang', color: 'bg-slate-800' },
          { id: 'MAT', label: 'Matematika', color: 'bg-blue-600' },
          { id: 'BIO', label: 'Biologi', color: 'bg-green-600' },
          { id: 'FIS', label: 'Fisika', color: 'bg-purple-600' },
          { id: 'KIM', label: 'Kimia', color: 'bg-pink-600' },
          { id: 'EKO', label: 'Ekonomi', color: 'bg-amber-600' },
          { id: 'GEO', label: 'Geografi', color: 'bg-teal-600' },
        ];

        const STATUS_TYPES = [
          { id: 'aman', label: 'Aman', color: 'bg-emerald-500', hex: '#10b981', icon: <Icon name="fa-solid fa-circle-check" size={16} /> },
          { id: 'pendalaman', label: 'Pendalaman', color: 'bg-amber-500', hex: '#f59e0b', icon: <Icon name="fa-solid fa-circle-question" size={16} /> },
          { id: 'belum', label: 'Belum Dikuasai', color: 'bg-rose-500', hex: '#ef4444', icon: <Icon name="fa-solid fa-circle-exclamation" size={16} /> },
        ];

        // ==========================================
        // FUNGSI BANTU (Helper)
        // ==========================================
        const parseScore = (scoreStr) => {
          if (!scoreStr) return 0;
          const str = String(scoreStr).trim();
          if (str.includes('/')) {
            const [num, den] = str.split('/');
            const n = Number(num);
            const d = Number(den);
            if (d === 0 || isNaN(n) || isNaN(d)) return 0;
            return (n / d) * 100;
          }
          const val = Number(str);
          return isNaN(val) ? 0 : val;
        };

        const getStudentStats = (studentProg) => {
          let totalDuration = 0;
          let totalScore = 0;
          let scoreCount = 0;
          let belumCount = 0;
          let pendalamanCount = 0;

          Object.values(studentProg).forEach(data => {
            const status = typeof data === 'object' ? (data.status || 'belum') : (data || 'belum');
            const dur = typeof data === 'object' ? Number(data.duration) : 0;
            const score = typeof data === 'object' ? data.score : '';

            if (status === 'belum') belumCount++;
            if (status === 'pendalaman') pendalamanCount++;
            if (dur && !isNaN(dur)) totalDuration += dur;
            if (score) {
              totalScore += parseScore(score);
              scoreCount++;
            }
          });

          const avgScore = scoreCount > 0 ? Math.round(totalScore / scoreCount) : 0;
          return { totalDuration, avgScore, belumCount, pendalamanCount };
        };

        // ==========================================
        // KOMPONEN: DASHBOARD UTAMA
        // ==========================================
        const Dashboard = ({ progressData, activeField }) => {
          const filteredStudents = useMemo(() => {
            return activeField === 'ALL' ? DELEGASI : DELEGASI.filter(s => s.field === activeField);
          }, [activeField]);

          const stats = useMemo(() => {
            let counts = { aman: 0, pendalaman: 0, belum: 0, total: 0 };
            filteredStudents.forEach(student => {
              const studentSyllabus = SYLLABUS_DB[student.field];
              counts.total += studentSyllabus.length;
              const pData = progressData[student.id] || {};
              studentSyllabus.forEach(topic => {
                const statData = pData[topic.id];
                const statusVal = typeof statData === 'object' ? (statData.status || 'belum') : (statData || 'belum');
                if (counts[statusVal] !== undefined) counts[statusVal]++;
              });
            });
            return counts;
          }, [progressData, filteredStudents]);

          const fieldAverages = useMemo(() => {
            if (activeField !== 'ALL') return [];
            return FIELDS.filter(f => f.id !== 'ALL').map(field => {
              const studentsInField = DELEGASI.filter(s => s.field === field.id);
              let totalFieldScore = 0;
              let validStudentCount = 0;
              studentsInField.forEach(student => {
                 const pData = progressData[student.id] || {};
                 const stStats = getStudentStats(pData);
                 if (stStats.avgScore > 0) {
                   totalFieldScore += stStats.avgScore;
                   validStudentCount++;
                 }
              });
              const avgScore = validStudentCount > 0 ? Math.round(totalFieldScore / validStudentCount) : 0;
              return { ...field, avgScore };
            });
          }, [progressData, activeField]);

          const warningStudents = useMemo(() => {
            return filteredStudents.map(student => {
              const pData = progressData[student.id] || {};
              const stStats = getStudentStats(pData);
              return { ...student, ...stStats };
            }).filter(s => s.belumCount >= 3 || (s.avgScore > 0 && s.avgScore < 60) || s.pendalamanCount >= 2);
          }, [filteredStudents, progressData]);

          const handleExportCSV = () => {
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Nama Siswa,Bidang,Status Awal,Progress Aman (%),Total Jam Belajar,Rata-rata Skor,Materi Belum Dikuasai\n";

            filteredStudents.forEach(student => {
              const studentProg = progressData[student.id] || {};
              const syllabusLen = SYLLABUS_DB[student.field].length;
              const stStats = getStudentStats(studentProg);
              const amanCount = Object.values(studentProg).filter(v => (v.status || v) === 'aman').length;
              const percentAman = Math.round((amanCount / syllabusLen) * 100);

              csvContent += `"${student.name}","${student.field}","${student.initialStatus}","${percentAman}%","${stStats.totalDuration}","${stStats.avgScore}","${stStats.belumCount}"\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Laporan_OSN_${activeField}_MANJ.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          const pctAman = stats.total > 0 ? (stats.aman / stats.total) * 100 : 0;
          const pctPendalaman = stats.total > 0 ? (stats.pendalaman / stats.total) * 100 : 0;
          const pctBelum = stats.total > 0 ? (stats.belum / stats.total) * 100 : 100;

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              
              <div className="flex justify-end mb-4">
                <button 
                  onClick={handleExportCSV}
                  className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md transition-colors"
                >
                  <Icon name="fa-solid fa-download" size={16} /> Unduh Laporan (CSV)
                </button>
              </div>

              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                  <Icon name="fa-solid fa-chart-pie" size={20} className="text-indigo-600" /> 
                  Analisis Visual Kesiapan
                </h3>
                <div className={`grid gap-8 ${activeField === 'ALL' ? 'md:grid-cols-2' : 'grid-cols-1'}`}>
                    <div className="flex flex-col justify-center">
                        <div className="mb-4">
                            <h4 className="text-sm font-bold text-slate-600 mb-1">Distribusi Penguasaan Silabus</h4>
                            <p className="text-xs text-slate-400">Total {stats.total} Materi Pokok</p>
                        </div>
                        <div className="h-8 w-full flex rounded-lg overflow-hidden shadow-inner bg-slate-100 mb-4">
                            <div style={{ width: `${pctAman}%` }} className="bg-emerald-500 transition-all duration-1000 ease-out" title={`Aman: ${Math.round(pctAman)}%`}></div>
                            <div style={{ width: `${pctPendalaman}%` }} className="bg-amber-500 transition-all duration-1000 ease-out" title={`Pendalaman: ${Math.round(pctPendalaman)}%`}></div>
                            <div style={{ width: `${pctBelum}%` }} className="bg-rose-500 transition-all duration-1000 ease-out" title={`Belum Dikuasai: ${Math.round(pctBelum)}%`}></div>
                        </div>
                        <div className="flex flex-wrap gap-4 text-xs font-bold text-slate-600">
                            <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-emerald-500"></div> Aman ({Math.round(pctAman)}%)</div>
                            <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-amber-500"></div> Pendalaman ({Math.round(pctPendalaman)}%)</div>
                            <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-rose-500"></div> Belum Dikuasai ({Math.round(pctBelum)}%)</div>
                        </div>
                    </div>
                    {activeField === 'ALL' && (
                        <div className="border-l border-slate-100 pl-8 flex flex-col">
                            <div className="mb-4">
                                <h4 className="text-sm font-bold text-slate-600 mb-1">Rata-rata Skor Latihan per Bidang</h4>
                                <p className="text-xs text-slate-400">Skala 0 - 100</p>
                            </div>
                            <div className="h-40 flex items-end justify-between gap-2 mt-auto relative">
                                <div className="absolute inset-0 flex flex-col justify-between pointer-events-none opacity-20">
                                    <div className="w-full border-t border-slate-400"></div>
                                    <div className="w-full border-t border-slate-400"></div>
                                    <div className="w-full border-t border-slate-400"></div>
                                    <div className="w-full border-t border-slate-400"></div>
                                    <div className="w-full border-t border-slate-400"></div>
                                </div>
                                {fieldAverages.map(field => (
                                    <div key={field.id} className="flex flex-col items-center flex-1 group z-10">
                                        <div className="opacity-0 group-hover:opacity-100 transition-opacity bg-slate-800 text-white text-[10px] py-1 px-2 rounded mb-2 absolute -top-8 font-bold pointer-events-none">
                                            {field.avgScore}
                                        </div>
                                        <div 
                                            className={`w-full max-w-[32px] rounded-t-sm transition-all duration-1000 ease-out flex items-start justify-center pt-2 ${field.color} shadow-sm group-hover:brightness-110`}
                                            style={{ height: `${Math.max(field.avgScore, 2)}%` }} 
                                        >
                                            {field.avgScore > 20 && <span className="text-white text-[10px] font-black">{field.avgScore}</span>}
                                        </div>
                                        <span className="text-[10px] font-bold text-slate-500 mt-2">{field.id}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
              </div>

              {warningStudents.length > 0 && (
                <div className="bg-red-50 border border-red-200 rounded-xl p-6 shadow-sm">
                  <h3 className="text-red-700 font-bold text-lg mb-4 flex items-center gap-2">
                    <Icon name="fa-regular fa-bell animate-bounce" size={20} /> 
                    Sistem Peringatan Dini: Siswa Perlu Perhatian Khusus
                  </h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {warningStudents.map(student => (
                      <div key={student.id} className="bg-white p-4 rounded-lg border border-red-100 shadow-sm flex flex-col justify-between">
                        <div>
                          <div className="font-bold text-slate-800 text-sm">{student.name}</div>
                          <div className="text-xs text-slate-500 uppercase">{student.field}</div>
                        </div>
                        <div className="mt-3 text-xs font-medium text-red-600 space-y-1">
                          {student.belumCount >= 3 && <div>• {student.belumCount} materi menumpuk (Belum Dikuasai)</div>}
                          {student.pendalamanCount >= 2 && <div>• {student.pendalamanCount} materi butuh (Pendalaman)</div>}
                          {(student.avgScore > 0 && student.avgScore < 60) && <div>• Rata-rata skor rendah ({student.avgScore})</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {STATUS_TYPES.map(type => (
                  <div key={type.id} className="bg-white p-6 rounded-xl shadow-sm border-l-4" style={{ borderColor: type.hex }}>
                    <div className="flex justify-between items-center">
                      <span className="text-slate-500 font-bold uppercase text-xs tracking-wider">{type.label}</span>
                      <div style={{ color: type.hex }}>{type.icon}</div>
                    </div>
                    <div className="text-4xl font-black mt-2 text-slate-800">
                      {stats.total > 0 ? Math.round((stats[type.id] / stats.total) * 100) : 0}%
                    </div>
                    <div className="text-xs text-slate-400 mt-1">{stats[type.id]} dari {stats.total} Materi Pokok</div>
                  </div>
                ))}
              </div>

              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                  <Icon name="fa-solid fa-chart-column" size={20} className="text-indigo-600" /> 
                  Progres Detail Siswa ({filteredStudents.length} Delegasi)
                </h3>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-x-8 gap-y-6">
                  {filteredStudents.map(student => {
                    const studentProg = progressData[student.id] || {};
                    const syllabusLen = SYLLABUS_DB[student.field].length;
                    const stStats = getStudentStats(studentProg);
                    const amanCount = Object.values(studentProg).filter(v => (v.status || v) === 'aman').length;
                    const pendalamanCount = Object.values(studentProg).filter(v => (v.status || v) === 'pendalaman').length;
                    const percentAman = Math.round((amanCount / syllabusLen) * 100);
                    const percentPendalaman = Math.round((pendalamanCount / syllabusLen) * 100);
                    const fieldColor = FIELDS.find(f => f.id === student.field)?.color || 'bg-slate-800';

                    return (
                      <div key={student.id} className="space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-100 hover:border-indigo-300 transition-colors">
                        <div className="flex justify-between items-start">
                          <div className="flex items-center gap-2">
                            <span className={`text-[10px] text-white px-2 py-0.5 rounded font-bold ${fieldColor}`}>{student.field}</span>
                            <div>
                              <div className="font-bold text-slate-800 text-sm leading-tight">{student.name}</div>
                              <div className="flex gap-3 mt-1 text-[11px] font-bold text-slate-500">
                                <span className="flex items-center gap-1"><Icon name="fa-regular fa-clock" size={12}/> {stStats.totalDuration} Jam</span>
                                <span className="flex items-center gap-1"><Icon name="fa-solid fa-award" size={12}/> Avg Skor: {stStats.avgScore}</span>
                              </div>
                            </div>
                          </div>
                          <div className="text-right">
                            <span className="text-lg font-black text-slate-800">{percentAman}%</span>
                          </div>
                        </div>
                        <div className="h-2.5 w-full bg-slate-200 rounded-full overflow-hidden flex">
                          <div className="h-full bg-emerald-500 transition-all duration-500" style={{ width: `${percentAman}%` }}></div>
                          <div className="h-full bg-amber-500 transition-all duration-500" style={{ width: `${percentPendalaman}%` }}></div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // KOMPONEN: CEKLIS & LOGBOOK
        // ==========================================
        const TopicCard = ({ studentId, topic, currentData, onSave }) => {
          const [isExpanded, setIsExpanded] = useState(false);
          const status = typeof currentData === 'object' ? (currentData?.status || 'belum') : (currentData || 'belum');
          const initialScore = typeof currentData === 'object' ? (currentData?.score || '') : '';
          const initialDuration = typeof currentData === 'object' ? (currentData?.duration || '') : '';
          const initialNotes = typeof currentData === 'object' ? (currentData?.notes || '') : '';
          const timestamp = typeof currentData === 'object' ? currentData?.updatedAt : null;

          const [score, setScore] = useState(initialScore);
          const [duration, setDuration] = useState(initialDuration);
          const [notes, setNotes] = useState(initialNotes);

          const hasNotes = initialScore || initialDuration || initialNotes;
          const titleParts = topic.title.split(': ');
          const dayLabel = titleParts[0];
          const topicName = titleParts[1] || '';

          const handleStatusChange = (newStatus) => {
            onSave(studentId, topic.id, { status: newStatus, score, duration, notes, updatedAt: new Date().toISOString() });
          };

          const handleSaveDetails = () => {
            onSave(studentId, topic.id, { status, score, duration, notes, updatedAt: new Date().toISOString() });
            setIsExpanded(false);
          };

          const formattedTime = timestamp ? new Date(timestamp).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' }) : '';

          return (
            <div className={`flex flex-col p-3 md:p-4 bg-white rounded-lg border transition-all ml-2 md:ml-4 ${isExpanded ? 'border-indigo-600 shadow-md' : 'border-slate-200 hover:border-slate-300 hover:shadow-sm'}`}>
              <div className="flex flex-col xl:flex-row xl:items-center justify-between gap-2 md:gap-3">
                <div className="flex items-start gap-2 md:gap-3 flex-grow min-w-0">
                  <Icon name="fa-solid fa-book-open" size={14} className="text-indigo-400 mt-1 shrink-0"/>
                  <div className="min-w-0">
                    <span className="font-black text-indigo-700 mr-1 text-xs md:text-sm">{dayLabel}:</span>
                    <span className="font-medium text-slate-700 text-xs md:text-sm">{topicName}</span>
                  </div>
                </div>
                <div className="flex flex-wrap items-center gap-1.5 md:gap-2 shrink-0 pl-5 md:pl-7 xl:pl-0">
                  {STATUS_TYPES.map(type => (
                    <button
                      key={type.id}
                      onClick={() => handleStatusChange(type.id)}
                      className={`flex items-center justify-center px-2 md:px-3 py-1 md:py-1.5 rounded text-[10px] md:text-xs font-bold transition-all ${
                        status === type.id 
                        ? `${type.color} text-white shadow-md` 
                        : 'bg-slate-50 text-slate-400 border border-slate-200 hover:border-slate-400 hover:text-slate-600'
                      }`}
                    >
                      {type.label}
                    </button>
                  ))}
                  <div className="w-px h-5 bg-slate-200 mx-0.5 hidden xl:block"></div>
                  <button 
                    onClick={() => setIsExpanded(!isExpanded)}
                    className={`flex items-center gap-1 px-2 md:px-3 py-1 md:py-1.5 rounded text-[10px] md:text-xs font-bold transition-all border ${
                      isExpanded || hasNotes
                      ? 'bg-indigo-50 text-indigo-600 border-indigo-200 hover:bg-indigo-100'
                      : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'
                    }`}
                  >
                    <Icon name="fa-regular fa-message" size={12} className={hasNotes && !isExpanded ? 'text-indigo-600' : ''} />
                    Logbook
                    <Icon name="fa-solid fa-chevron-down" size={11} className={`transition-transform ${isExpanded ? 'rotate-180' : ''}`} />
                  </button>
                </div>
              </div>
              {isExpanded && (
                <div className="mt-4 pt-4 border-t border-slate-100 pl-7 animate-in fade-in slide-in-from-top-2">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                      <label className="flex items-center gap-1.5 text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">
                        <Icon name="fa-regular fa-clock" size={14} /> Durasi Belajar (Jam)
                      </label>
                      <input 
                        type="number" step="0.5" placeholder="Misal: 2.5" 
                        className="w-full text-sm p-2 bg-slate-50 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-600"
                        value={duration} onChange={(e) => setDuration(e.target.value)}
                      />
                    </div>
                    <div>
                      <label className="flex items-center gap-1.5 text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">
                        <Icon name="fa-solid fa-award" size={14} /> Skor Latihan
                      </label>
                      <input 
                        type="text" placeholder="Misal: 15/20 atau 85" 
                        className="w-full text-sm p-2 bg-slate-50 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-600"
                        value={score} onChange={(e) => setScore(e.target.value)}
                      />
                    </div>
                  </div>
                  <div className="mb-4">
                    <label className="flex items-center gap-1.5 text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">
                      <Icon name="fa-solid fa-circle-exclamation" size={14} /> Kendala / Topik Sulit
                    </label>
                    <textarea 
                      rows="3" placeholder="Catat kesulitan siswa di sini..."
                      className="w-full text-sm p-2.5 bg-slate-50 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-600 resize-none"
                      value={notes} onChange={(e) => setNotes(e.target.value)}
                    ></textarea>
                  </div>
                  <div className="flex items-center justify-between mt-2">
                    <span className="text-[10px] text-slate-400 font-medium flex items-center gap-1">
                      {formattedTime && <><Icon name="fa-solid fa-calendar-check" size={12}/> Update: {formattedTime}</>}
                    </span>
                    <button 
                      onClick={handleSaveDetails}
                      className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md text-sm font-bold shadow-sm transition-colors"
                    >
                      <Icon name="fa-regular fa-floppy-disk" size={16} /> Simpan Logbook
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const ChecklistView = ({ user, progressData, setProgressData, activeField, isDemo }) => {
          const [selectedStudent, setSelectedStudent] = useState(null);
          const [isSaving, setIsSaving] = useState(false);
          const [searchTerm, setSearchTerm] = useState("");
          const [showNeedsAttentionOnly, setShowNeedsAttentionOnly] = useState(false);

          const filteredStudents = useMemo(() => {
            let list = activeField === 'ALL' ? DELEGASI : DELEGASI.filter(s => s.field === activeField);
            if (searchTerm) {
              const lowerQuery = searchTerm.toLowerCase();
              list = list.filter(s => s.name.toLowerCase().includes(lowerQuery));
            }
            return list;
          }, [activeField, searchTerm]);

          const handleSaveTopicData = async (studentId, topicId, dataObj) => {
            setIsSaving(true);
            const studentProg = progressData[studentId] || {};
            const newProg = { ...studentProg, [topicId]: dataObj };
            
            if (!isDemo && user) {
                try {
                  await setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'progress', studentId), newProg);
                } catch (err) { console.error(err); }
            } else {
                // Mode demo (Tanpa Firebase Valid) - Simpan di memori sementara
                setProgressData(prev => ({ ...prev, [studentId]: newProg }));
            }
            setIsSaving(false);
          };

          if (selectedStudent) {
            const student = DELEGASI.find(s => s.id === selectedStudent);
            const studentProg = progressData[selectedStudent] || {};
            const syllabus = SYLLABUS_DB[student.field];
            
            const displayedSyllabus = showNeedsAttentionOnly 
              ? syllabus.filter(t => {
                  const stat = typeof studentProg[t.id] === 'object' ? studentProg[t.id].status : studentProg[t.id];
                  return stat !== 'aman';
                })
              : syllabus;

            const groupedSyllabus = displayedSyllabus.reduce((acc, topic) => {
              if (!acc[topic.cat]) acc[topic.cat] = [];
              acc[topic.cat].push(topic);
              return acc;
            }, {});

            const fieldMeta = FIELDS.find(f => f.id === student.field);

            return (
              <div className="space-y-4 animate-in slide-in-from-right-4 duration-300">
                <button onClick={() => { setSelectedStudent(null); setShowNeedsAttentionOnly(false); }} className="text-indigo-600 font-bold flex items-center gap-2 hover:-translate-x-1 transition-transform">
                  <Icon name="fa-solid fa-chevron-left" size={20} /> Kembali ke Daftar Siswa
                </button>
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                  <div className="flex flex-col md:flex-row md:justify-between md:items-start mb-6 gap-4 border-b border-slate-100 pb-6">
                    <div>
                      <div className="flex items-center gap-3 mb-2">
                        <span className={`${fieldMeta.color} text-white px-3 py-1 rounded-full text-xs font-bold tracking-widest`}>OSN {fieldMeta.label}</span>
                        <span className={`text-xs font-bold px-2 py-1 rounded ${student.initialStatus === 'Aktif' ? 'bg-emerald-100 text-emerald-700' : student.initialStatus === 'Stagnan' ? 'bg-amber-100 text-amber-700' : 'bg-rose-100 text-rose-700'}`}>Status Awal: {student.initialStatus}</span>
                      </div>
                      <h3 className="text-3xl font-black text-slate-800">{student.name}</h3>
                    </div>
                    <div className="flex flex-col items-end gap-3">
                       {isSaving && <div className="text-xs bg-indigo-50 border border-indigo-100 text-indigo-600 px-4 py-2 rounded-full animate-pulse font-bold flex items-center gap-2"><Icon name="fa-regular fa-square-check" size={14}/> Menyimpan...</div>}
                       <label className="flex items-center gap-2 cursor-pointer bg-slate-50 px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition-colors">
                          <input type="checkbox" className="w-4 h-4 text-indigo-600 rounded border-slate-300" checked={showNeedsAttentionOnly} onChange={(e) => setShowNeedsAttentionOnly(e.target.checked)} />
                          <span className="text-sm font-bold text-slate-600">Sembunyikan Materi Aman</span>
                       </label>
                    </div>
                  </div>
                  <div className="space-y-10">
                    {Object.keys(groupedSyllabus).length === 0 ? (
                      <div className="text-center py-10 text-slate-400 font-medium">
                        <Icon name="fa-solid fa-circle-check" size={48} className="mx-auto text-emerald-400 mb-3 opacity-50 block" />
                        Semua materi di bidang ini sudah berstatus AMAN.
                      </div>
                    ) : (
                      Object.keys(groupedSyllabus).map(cat => (
                        <div key={cat} className="space-y-3">
                          <h4 className="font-bold text-slate-500 text-sm uppercase tracking-widest border-l-4 border-indigo-600 pl-3 py-1 bg-slate-50 rounded-r-lg">Topik Pokok: {cat}</h4>
                          <div className="grid gap-2">
                            {groupedSyllabus[cat].map(topic => (
                              <TopicCard key={topic.id} studentId={student.id} topic={topic} currentData={studentProg[topic.id]} onSave={handleSaveTopicData} />
                            ))}
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="animate-in fade-in duration-500 space-y-6">
              <div className="relative max-w-md">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <Icon name="fa-solid fa-magnifying-glass" size={18} className="text-slate-400" />
                </div>
                <input type="text" placeholder="Cari nama siswa..." className="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-600 shadow-sm" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                {filteredStudents.length > 0 ? filteredStudents.map(student => {
                  const fieldMeta = FIELDS.find(f => f.id === student.field);
                  return (
                    <button key={student.id} onClick={() => setSelectedStudent(student.id)} className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 hover:border-indigo-600 hover:shadow-md transition-all text-left flex flex-col group">
                      <div className="flex justify-between items-start mb-4">
                        <span className={`${fieldMeta.color} text-white text-[10px] font-bold px-2 py-1 rounded`}>{fieldMeta.label}</span>
                        <Icon name="fa-solid fa-chevron-right" size={20} className="text-slate-300 group-hover:text-indigo-600 group-hover:translate-x-1 transition-all" />
                      </div>
                      <div className="font-bold text-slate-800 text-lg leading-tight group-hover:text-indigo-600 transition-colors mb-1">{student.name}</div>
                      <div className="text-slate-400 text-xs">Update Silabus & Isi Logbook</div>
                    </button>
                  );
                }) : (
                  <div className="col-span-full py-12 text-center text-slate-400 font-medium bg-white rounded-xl border border-slate-200 border-dashed">Siswa dengan nama "{searchTerm}" tidak ditemukan.</div>
                )}
              </div>
            </div>
          );
        };

        // ==========================================
        // KOMPONEN: PUSAT KENDALA
        // ==========================================
        const IssuesView = ({ progressData, activeField }) => {
          const issues = useMemo(() => {
            let allIssues = [];
            DELEGASI.forEach(student => {
              if (activeField !== 'ALL' && student.field !== activeField) return;
              const pData = progressData[student.id] || {};
              const syllabus = SYLLABUS_DB[student.field];
              syllabus.forEach(topic => {
                const topicData = pData[topic.id];
                if (topicData && typeof topicData === 'object' && topicData.notes && topicData.notes.trim() !== '') {
                  allIssues.push({ student, topic, notes: topicData.notes, status: topicData.status, date: topicData.updatedAt ? new Date(topicData.updatedAt) : new Date(0) });
                }
              });
            });
            return allIssues.sort((a, b) => b.date - a.date);
          }, [progressData, activeField]);

          return (
            <div className="animate-in fade-in duration-500 space-y-6">
              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <div className="flex items-center justify-between mb-6 border-b border-slate-100 pb-4">
                   <h3 className="text-xl font-black text-slate-800 flex items-center gap-2"><Icon name="fa-regular fa-comments" size={24} className="text-indigo-600" /> Inbox Pusat Kendala Pembelajaran</h3>
                   <span className="bg-slate-100 text-slate-600 font-bold px-3 py-1 rounded-full text-xs">Total Laporan: {issues.length}</span>
                </div>
                {issues.length === 0 ? (
                  <div className="text-center py-16 text-slate-400">
                    <Icon name="fa-solid fa-circle-check" size={64} className="mx-auto text-slate-200 mb-4 block" />
                    <p className="font-medium text-lg">Belum ada catatan kendala dari pembimbing.</p>
                    <p className="text-sm">Semua proses belajar berjalan lancar!</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {issues.map((issue, idx) => {
                      const fieldColor = FIELDS.find(f => f.id === issue.student.field)?.color || 'bg-slate-800';
                      const statusColor = issue.status === 'belum' ? 'text-rose-500' : issue.status === 'pendalaman' ? 'text-amber-500' : 'text-emerald-500';
                      return (
                        <div key={idx} className="p-4 bg-slate-50 border border-slate-200 rounded-xl hover:shadow-md transition-shadow flex flex-col">
                          <div className="flex justify-between items-start mb-3">
                            <div className="flex items-center gap-2">
                              <span className={`text-[10px] text-white px-2 py-0.5 rounded font-bold ${fieldColor}`}>{issue.student.field}</span>
                              <span className="font-bold text-slate-800 text-sm">{issue.student.name}</span>
                            </div>
                            <span className="text-[10px] text-slate-400 font-medium">{issue.date.getTime() > 0 ? issue.date.toLocaleDateString('id-ID', { day:'numeric', month:'short' }) : ''}</span>
                          </div>
                          <div className="text-xs font-bold text-indigo-700 mb-2 border-b border-slate-200 pb-2">{issue.topic.title}</div>
                          <div className="flex-grow"><p className="text-sm text-slate-600 italic">"{issue.notes}"</p></div>
                          <div className="mt-4 flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-wider">
                            Status Topik: <span className={statusColor}>{issue.status === 'belum' ? 'Belum Dikuasai' : issue.status}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          );
        };

        // ==========================================
        // KOMPONEN: LEADERBOARD
        // ==========================================
        const LeaderboardView = ({ progressData, activeField }) => {
          const rankedStudents = useMemo(() => {
            let list = activeField === 'ALL' ? DELEGASI : DELEGASI.filter(s => s.field === activeField);
            let scoredList = list.map(student => {
              const pData = progressData[student.id] || {};
              const stats = getStudentStats(pData);
              return { ...student, ...stats };
            });
            return scoredList.sort((a, b) => {
              if (b.avgScore !== a.avgScore) return b.avgScore - a.avgScore;
              return b.totalDuration - a.totalDuration;
            });
          }, [progressData, activeField]);

          return (
            <div className="animate-in fade-in duration-500 space-y-6">
              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <div className="flex items-center justify-between mb-8 border-b border-slate-100 pb-4">
                   <h3 className="text-xl font-black text-slate-800 flex items-center gap-2"><Icon name="fa-solid fa-trophy" size={24} className="text-indigo-600" /> Papan Peringkat Delegasi (Leaderboard)</h3>
                </div>
                <div className="space-y-3">
                  {rankedStudents.map((student, idx) => {
                    const fieldMeta = FIELDS.find(f => f.id === student.field);
                    const isTop3 = idx < 3;
                    let rankBadge = "bg-slate-100 text-slate-500";
                    if (idx === 0) rankBadge = "bg-yellow-400 text-white shadow-md shadow-yellow-200";
                    else if (idx === 1) rankBadge = "bg-slate-300 text-slate-700 shadow-md";
                    else if (idx === 2) rankBadge = "bg-amber-600 text-white shadow-md shadow-amber-900/20";

                    return (
                      <div key={student.id} className={`flex items-center justify-between p-4 rounded-xl border transition-all ${isTop3 ? 'border-indigo-600/20 bg-indigo-50/30' : 'border-slate-100 bg-white hover:bg-slate-50'}`}>
                        <div className="flex items-center gap-4">
                          <div className={`w-8 h-8 rounded-full flex items-center justify-center font-black text-sm ${rankBadge}`}>{idx + 1}</div>
                          <div>
                            <div className="font-bold text-slate-800 text-sm md:text-base flex items-center gap-2">
                              {student.name}
                              <span className={`${fieldMeta.color} text-white text-[9px] px-1.5 py-0.5 rounded uppercase tracking-wider`}>{fieldMeta.id}</span>
                            </div>
                            <div className="text-xs text-slate-400 mt-0.5">Status: {student.initialStatus}</div>
                          </div>
                        </div>
                        <div className="flex items-center gap-6">
                          <div className="hidden md:flex flex-col items-end">
                            <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Durasi</span>
                            <span className="font-bold text-slate-700 flex items-center gap-1"><Icon name="fa-regular fa-clock" size={14} className="text-slate-400"/> {student.totalDuration} Jam</span>
                          </div>
                          <div className="flex flex-col items-end">
                            <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Rata-rata Skor</span>
                            <span className={`font-black text-lg ${isTop3 ? 'text-indigo-600' : 'text-slate-700'}`}>{student.avgScore}</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // KOMPONEN: PUSAT UNDUHAN
        // ==========================================
        const DownloadsView = () => {
          const RESOURCES = [
            {
              category: "Dokumen Resmi & Silabus",
              desc: "Panduan dan regulasi resmi dari Puspresnas Kemendikbud",
              items: [
                { title: "Buku Pedoman OSN 2026", type: "PDF", size: "2.4 MB", icon: <Icon name="fa-regular fa-file-lines" size={24} className="text-rose-500" />, action: "Download" },
                { title: "Silabus Materi Seluruh Bidang", type: "PDF", size: "1.8 MB", icon: <Icon name="fa-regular fa-file-lines" size={24} className="text-rose-500" />, action: "Download" },
                { title: "SOP Pembimbing MA Nurul Jadid", type: "PDF", size: "850 KB", icon: <Icon name="fa-regular fa-file-lines" size={24} className="text-blue-500" />, action: "Download" }
              ]
            },
            {
              category: "Arsip Bank Soal & Pembahasan",
              desc: "Kumpulan soal asli OSN Kabupaten, Provinsi, dan Nasional",
              items: [
                { title: "Bank Soal Matematika (2020-2025)", type: "ZIP", size: "15 MB", icon: <Icon name="fa-solid fa-box-archive" size={24} className="text-amber-500" />, action: "Download" },
                { title: "Bank Soal IPA (Bio, Fis, Kim)", type: "ZIP", size: "42 MB", icon: <Icon name="fa-solid fa-box-archive" size={24} className="text-amber-500" />, action: "Download" },
                { title: "Bank Soal IPS (Eko, Geo)", type: "ZIP", size: "28 MB", icon: <Icon name="fa-solid fa-box-archive" size={24} className="text-amber-500" />, action: "Download" },
                { title: "Kunci & Pembahasan Terpadu", type: "PDF", size: "5.5 MB", icon: <Icon name="fa-regular fa-file-lines" size={24} className="text-rose-500" />, action: "Download" }
              ]
            },
            {
              category: "Referensi Belajar Digital",
              desc: "Tautan rekomendasi untuk sesi Akselerasi Digital (Siswa)",
              items: [
                { title: "Olympia Gold Academy (Strategi)", type: "LINK", size: "YouTube", icon: <Icon name="fa-brands fa-youtube" size={24} className="text-red-500" />, action: "Buka Tautan" },
                { title: "Simulasi CBT Puspresnas Terpadu", type: "LINK", size: "Website", icon: <Icon name="fa-solid fa-arrow-up-right-from-square" size={24} className="text-indigo-500" />, action: "Buka Tautan" },
                { title: "Materi E-book Perpusnas", type: "LINK", size: "Portal", icon: <Icon name="fa-solid fa-arrow-up-right-from-square" size={24} className="text-indigo-500" />, action: "Buka Tautan" }
              ]
            }
          ];

          return (
            <div className="animate-in fade-in duration-500 space-y-6">
              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <div className="flex items-center justify-between mb-8 border-b border-slate-100 pb-4">
                   <div>
                     <h3 className="text-xl font-black text-slate-800 flex items-center gap-2 mb-1"><Icon name="fa-solid fa-cloud-arrow-down" size={24} className="text-indigo-600" /> Pusat Referensi & Unduhan</h3>
                     <p className="text-sm text-slate-500">Kumpulan modul, bank soal, dan tautan belajar resmi untuk pembimbing dan siswa.</p>
                   </div>
                </div>
                <div className="space-y-10">
                  {RESOURCES.map((section, idx) => (
                    <div key={idx} className="space-y-4">
                      <div>
                        <h4 className="font-bold text-slate-700 text-lg">{section.category}</h4>
                        <p className="text-xs text-slate-400">{section.desc}</p>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {section.items.map((item, itemIdx) => (
                          <div key={itemIdx} className="flex flex-col justify-between p-4 bg-slate-50 border border-slate-200 rounded-xl hover:border-indigo-400 hover:shadow-md transition-all group">
                            <div className="flex items-start gap-3 mb-4">
                              <div className="p-2 bg-white rounded-lg shadow-sm">{item.icon}</div>
                              <div>
                                <h5 className="font-bold text-slate-800 text-sm leading-tight group-hover:text-indigo-600 transition-colors">{item.title}</h5>
                                <span className="text-[10px] font-bold text-slate-400 bg-white border border-slate-200 px-2 py-0.5 rounded mt-2 inline-block">{item.type} • {item.size}</span>
                              </div>
                            </div>
                            <button onClick={() => alert(`Simulasi: Membuka/Mengunduh file "${item.title}"...`)} className="w-full py-2 bg-white border border-slate-200 text-slate-600 text-xs font-bold rounded-lg group-hover:bg-indigo-600 group-hover:text-white group-hover:border-indigo-600 transition-all flex items-center justify-center gap-2">
                              <Icon name={item.type === 'LINK' ? 'fa-solid fa-arrow-up-right-from-square' : 'fa-solid fa-download'} size={14} /> {item.action}
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // KOMPONEN UTAMA (APP)
        // ==========================================
        const App = () => {
          const [user, setUser] = useState(null);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [activeField, setActiveField] = useState('ALL');
          const [progressData, setProgressData] = useState({});
          const [loading, setLoading] = useState(true);
          const [showWarning, setShowWarning] = useState(false);

          useEffect(() => {
            if (!isFirebaseConfigured) {
                // Berjalan dalam "Demo Mode" jika kunci Firebase masih menggunakan teks panduan
                setLoading(false);
                setShowWarning(true);
                return;
            }

            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (err) { console.error("Auth error:", err); }
            };
            
            initAuth();
            const unsubscribeAuth = onAuthStateChanged(auth, (u) => setUser(u));
            return () => unsubscribeAuth();
          }, []);

          useEffect(() => {
            if (!isFirebaseConfigured || !user) return;

            const q = query(collection(db, 'artifacts', appIdStr, 'public', 'data', 'progress'));
            const unsubscribeProgress = onSnapshot(q, (snapshot) => {
              const data = {};
              snapshot.forEach(doc => { data[doc.id] = doc.data(); });
              setProgressData(data);
              setLoading(false);
            }, (err) => {
              console.error("Firestore error:", err);
              setLoading(false);
            });

            return () => unsubscribeProgress();
          }, [user]);

          if (loading) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-400 px-4">
                <div className="w-12 h-12 border-4 border-indigo-600 border-t-indigo-300 rounded-full animate-spin mb-4"></div>
                <p className="font-bold animate-pulse text-center text-sm md:text-base">Menghubungkan ke server MANJ Prestisius...</p>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-50 flex">
              {/* Pesan Peringatan Mode Demo */}
              {showWarning && (
                  <div className="fixed top-0 left-0 w-full bg-amber-500 text-amber-950 font-bold p-3 text-center text-xs md:text-sm z-50 shadow-md">
                      <Icon name="fa-solid fa-triangle-exclamation" className="mr-2" />
                      <span className="hidden md:inline">MODE DEMO: Aplikasi belum terhubung ke database. Buka file <code>index.html</code> dan ganti konfigurasi Firebase agar data tidak hilang saat halaman dimuat ulang.</span>
                      <span className="md:hidden">Mode Demo — Firebase belum dikonfigurasi.</span>
                      <button onClick={() => setShowWarning(false)} className="ml-3 underline text-amber-900">Tutup</button>
                  </div>
              )}

              {/* ================================
                  DESKTOP SIDEBAR (md ke atas)
                  ================================ */}
              <div className="hidden md:flex md:w-64 bg-slate-900 text-white flex-col fixed h-full z-20 shadow-xl" style={{ top: showWarning ? '48px' : '0' }}>
                <div className="p-6 flex items-center gap-4">
                  <div className="w-12 h-12 shrink-0 bg-white/10 rounded-xl p-1 flex items-center justify-center overflow-hidden">
                    <img src="LOGO_MANJ.png" alt="Logo MA Nurul Jadid" className="w-full h-full object-contain" onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/100x100/f59e0b/0f172a?text=NJ"; }} />
                  </div>
                  <div className="leading-tight">
                    <div className="font-black text-lg text-white tracking-wide">MONITORING OSN</div>
                    <div className="text-[11px] text-amber-500 font-bold uppercase tracking-wider mt-0.5">MA Nurul Jadid</div>
                  </div>
                </div>
                <nav className="flex-grow mt-6 px-3 space-y-2 overflow-y-auto scrollbar-hide pb-20">
                  <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-3 mb-2">Menu Utama</div>
                  <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-4 p-3 rounded-lg transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-white/10 hover:text-white'}`}>
                    <Icon name="fa-solid fa-table-cells-large" size={22} /><span className="font-bold text-sm">Dashboard</span>
                  </button>
                  <button onClick={() => setActiveTab('checklist')} className={`w-full flex items-center gap-4 p-3 rounded-lg transition-all ${activeTab === 'checklist' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-white/10 hover:text-white'}`}>
                    <Icon name="fa-regular fa-square-check" size={22} /><span className="font-bold text-sm">Update Progres</span>
                  </button>
                  <div className="pt-6 pb-2">
                     <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-3 mb-2">Analisis & Referensi</div>
                     <button onClick={() => setActiveTab('issues')} className={`w-full flex items-center gap-4 p-3 mb-2 rounded-lg transition-all ${activeTab === 'issues' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-white/10 hover:text-white'}`}>
                       <Icon name="fa-regular fa-comments" size={22} /><span className="font-bold text-sm">Pusat Kendala</span>
                     </button>
                     <button onClick={() => setActiveTab('leaderboard')} className={`w-full flex items-center gap-4 p-3 mb-2 rounded-lg transition-all ${activeTab === 'leaderboard' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-white/10 hover:text-white'}`}>
                       <Icon name="fa-solid fa-trophy" size={22} /><span className="font-bold text-sm">Peringkat Siswa</span>
                     </button>
                     <button onClick={() => setActiveTab('downloads')} className={`w-full flex items-center gap-4 p-3 rounded-lg transition-all ${activeTab === 'downloads' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-white/10 hover:text-white'}`}>
                       <Icon name="fa-solid fa-cloud-arrow-down" size={22} /><span className="font-bold text-sm">Pusat Unduhan</span>
                     </button>
                  </div>
                </nav>
                <div className="p-6 border-t border-white/10 bg-slate-900 absolute bottom-0 left-0 w-full z-30">
                  <div className="flex items-center gap-3 bg-white/5 border border-white/10 p-3 rounded-xl">
                    <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-600 to-purple-500 flex items-center justify-center text-sm font-bold shadow-inner"><Icon name="fa-regular fa-user" size={18}/></div>
                    <div className="overflow-hidden">
                      <div className="font-bold text-sm truncate text-slate-200">Al Basyir</div>
                      <div className="text-[10px] text-amber-500 font-bold tracking-widest uppercase truncate">Koordinator</div>
                    </div>
                  </div>
                </div>
              </div>

              {/* ================================
                  MOBILE TOP HEADER (di bawah md)
                  ================================ */}
              <div 
                className="md:hidden fixed left-0 w-full bg-slate-900 text-white z-30 mobile-header"
                style={{ top: showWarning ? '48px' : '0' }}
              >
                <div className="flex items-center gap-3 px-4 py-3">
                  <div className="w-9 h-9 shrink-0 bg-white/10 rounded-xl p-1 flex items-center justify-center overflow-hidden">
                    <img 
                      src="LOGO_MANJ.png" 
                      alt="Logo MANJ" 
                      className="w-full h-full object-contain"
                      onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/100x100/f59e0b/0f172a?text=NJ"; }}
                    />
                  </div>
                  <div className="leading-tight flex-grow">
                    <div className="font-black text-sm text-white tracking-wide">MONITORING OSN</div>
                    <div className="text-[10px] text-amber-500 font-bold uppercase tracking-wider">MA Nurul Jadid</div>
                  </div>
                  <div className="flex items-center gap-1.5 bg-emerald-500/20 border border-emerald-500/30 px-2.5 py-1 rounded-full">
                    <span className="relative flex h-2 w-2">
                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span className="text-[10px] font-bold text-emerald-400">Live</span>
                  </div>
                </div>
              </div>

              {/* ================================
                  MAIN CONTENT AREA
                  ================================ */}
              <div 
                className="flex-grow ml-0 md:ml-64 p-4 md:p-10 max-w-7xl pb-24 md:pb-6 w-full min-w-0"
                style={{ marginTop: showWarning ? '48px' : '0' }}
              >
                {/* Spacer untuk mobile top header (56px) */}
                <div className="h-14 md:hidden"></div>

                <header className="mb-6 md:mb-8">
                  <div className="flex flex-col md:flex-row md:items-start justify-between gap-3 mb-4 md:mb-6">
                    <div>
                      <h1 className="text-2xl md:text-4xl font-black text-slate-800 tracking-tight mb-1 uppercase">
                        {activeTab === 'dashboard' && 'Pusat Kendali Progres'}
                        {activeTab === 'checklist' && 'Pembaruan Silabus'}
                        {activeTab === 'issues' && 'Monitoring Kendala'}
                        {activeTab === 'leaderboard' && 'Peringkat Delegasi'}
                        {activeTab === 'downloads' && 'Pusat Referensi & Unduhan'}
                      </h1>
                      <p className="text-slate-500 font-medium text-sm md:text-base">Masa Persiapan OSN-K 2026 • MA Nurul Jadid</p>
                    </div>
                    <div className="hidden md:flex bg-white px-4 py-1.5 rounded-full border border-slate-200 text-sm font-bold text-slate-700 items-center gap-2 shadow-sm animate-pulse">
                      <span className="relative flex h-3 w-3">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                      </span>
                      Real-time Monitoring Active
                    </div>
                  </div>
                  {activeTab !== 'downloads' && (
                    <div className="flex items-center gap-2 overflow-x-auto pb-2 scrollbar-hide filter-scroll">
                      <div className="flex items-center gap-2 text-slate-400 text-sm font-bold mr-1 shrink-0"><Icon name="fa-solid fa-filter" size={14}/> <span className="hidden sm:inline">Filter:</span></div>
                      {FIELDS.map(field => (
                        <button key={field.id} onClick={() => setActiveField(field.id)} className={`whitespace-nowrap px-3 md:px-4 py-1.5 md:py-2 rounded-full text-xs font-bold transition-all shrink-0 ${activeField === field.id ? `${field.color} text-white shadow-md` : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                          {field.id === 'ALL' ? field.label : field.id === 'ALL' ? field.label : <><span className="md:hidden">{field.id}</span><span className="hidden md:inline">OSN {field.label}</span></>}
                        </button>
                      ))}
                    </div>
                  )}
                </header>

                {activeTab === 'dashboard' && <Dashboard progressData={progressData} activeField={activeField} />}
                {activeTab === 'checklist' && <ChecklistView user={user} progressData={progressData} setProgressData={setProgressData} activeField={activeField} isDemo={!isFirebaseConfigured} />}
                {activeTab === 'issues' && <IssuesView progressData={progressData} activeField={activeField} />}
                {activeTab === 'leaderboard' && <LeaderboardView progressData={progressData} activeField={activeField} />}
                {activeTab === 'downloads' && <DownloadsView />}
              </div>

              {/* ================================
                  MOBILE BOTTOM NAVIGATION (di bawah md)
                  ================================ */}
              <div className="md:hidden fixed bottom-0 left-0 w-full bg-slate-900 z-30 border-t border-white/10 mobile-bottom-nav">
                <div className="flex items-center justify-around px-1 pt-2 pb-1">
                  {[
                    { tab: 'dashboard',   icon: 'fa-solid fa-table-cells-large', label: 'Dashboard' },
                    { tab: 'checklist',   icon: 'fa-regular fa-square-check',    label: 'Progres'   },
                    { tab: 'issues',      icon: 'fa-regular fa-comments',         label: 'Kendala'   },
                    { tab: 'leaderboard', icon: 'fa-solid fa-trophy',             label: 'Peringkat' },
                    { tab: 'downloads',   icon: 'fa-solid fa-cloud-arrow-down',   label: 'Unduhan'   },
                  ].map(item => (
                    <button
                      key={item.tab}
                      onClick={() => setActiveTab(item.tab)}
                      className={`mobile-nav-btn flex flex-col items-center gap-0.5 px-3 py-2 min-w-0 flex-1 ${
                        activeTab === item.tab
                          ? 'bg-indigo-600 text-white'
                          : 'text-slate-400 active:bg-white/10'
                      }`}
                    >
                      <Icon name={item.icon} size={activeTab === item.tab ? 20 : 18} />
                      <span className={`text-[9px] font-bold leading-tight ${activeTab === item.tab ? 'text-white' : 'text-slate-500'}`}>
                        {item.label}
                      </span>
                    </button>
                  ))}
                </div>
              </div>

            </div>
          );
        };

        // Mulai Aplikasi
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
