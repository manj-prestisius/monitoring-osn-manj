                                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 relative animate-in zoom-in-95 duration-200 border border-slate-100">
                                    <button onClick={() => setAdminInputGuruId(null)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-50 text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-colors">
                                        <Icon name="fa-solid fa-xmark text-lg" />
                                    </button>
                                    <h3 className="text-lg font-black text-slate-800 mb-1 flex items-center gap-2">
                                        <Icon name="fa-solid fa-user-check text-[#5b51d8]" /> Input Absen Manual
                                    </h3>
                                    <p className="text-xs text-slate-500 font-bold uppercase tracking-widest mb-6 border-b pb-3">
                                        Untuk: <span className="text-[#5b51d8]">{APP_USERS.find(u => u.id === adminInputGuruId)?.name}</span>
                                    </p>
                                    
                                    <div className="space-y-4 text-left">
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Lokasi & Materi (Wajib)</label>
                                            <input 
                                                type="text" 
                                                placeholder="Contoh: Asrama - Bimbingan Mandiri" 
                                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#5b51d8] outline-none text-sm font-medium"
                                                value={adminLocation}
                                                onChange={e => setAdminLocation(e.target.value)}
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Upload Bukti Foto (Opsional)</label>
                                            <input type="file" accept="image/*" ref={adminFileInputRef} onChange={(e) => handleImageUpload(e, setAdminPhotoData)} className="hidden" />
                                            <div className="flex gap-3 items-center">
                                                <button onClick={() => adminFileInputRef.current.click()} className="flex-1 bg-white border-2 border-dashed border-slate-300 text-slate-600 hover:bg-slate-50 font-bold py-3 rounded-xl flex items-center justify-center gap-2 text-xs transition-colors">
                                                    <Icon name="fa-solid fa-camera" /> Tambah Foto
                                                </button>
                                                {adminPhotoData && (
                                                    <div className="w-12 h-12 rounded-lg overflow-hidden border border-slate-200 shrink-0 shadow-sm relative group">
                                                        <img src={adminPhotoData} alt="Preview" className="w-full h-full object-cover" />
                                                        <button onClick={() => setAdminPhotoData(null)} className="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <Icon name="fa-solid fa-trash text-white" />
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                            <p className="text-[9px] text-amber-600 mt-2 italic font-bold"><Icon name="fa-solid fa-circle-info" /> Catatan: Bukti foto bersifat opsional karena diinput secara langsung oleh otoritas Koordinator.</p>
                                        </div>

                                        <div className="flex gap-3 mt-8 pt-4 border-t border-slate-200">
                                            <button onClick={() => setAdminInputGuruId(null)} className="flex-1 bg-slate-100 text-slate-600 font-bold py-3.5 rounded-xl text-xs uppercase tracking-widest hover:bg-slate-200 transition-colors">
                                                Batal
                                            </button>
                                            <button onClick={handleAdminAbsen} disabled={isSubmitting || !adminLocation.trim()} className={`flex-1 font-bold py-3.5 rounded-xl text-xs uppercase tracking-widest transition-all shadow-md ${isSubmitting || !adminLocation.trim() ? 'bg-slate-300 text-slate-500 cursor-not-allowed shadow-none' : 'bg-[#5b51d8] text-white hover:bg-indigo-700 shadow-indigo-500/30'}`}>
                                                {isSubmitting ? 'Menyimpan...' : 'Simpan Absen'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
                            <div className="flex items-center gap-3 border-b border-slate-100 pb-4 mb-6">
                                <Icon name="fa-solid fa-users-viewfinder text-2xl text-indigo-600" />
                                <h3 className="text-xl font-black text-slate-800 tracking-tight">Dashboard Kontrol Vakasi & Kehadiran</h3>
                            </div>
                            <p className="text-sm text-slate-500 mb-6 font-medium">Klik pada kartu nama guru untuk melihat rincian riwayat bimbingan, atau menginput kehadiran mereka secara manual.</p>
                            
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                {guruUsers.map(guru => {
                                    const logs = attendanceData[guru.id]?.logs || [];
                                    const count = logs.length;
                                    const pct = Math.min(Math.round((count / TARGET_PERTEMUAN) * 100), 100);
                                    const colorInfo = FIELDS.find(f => f.id === guru.field);
                                    const isExpanded = expandedAdminAtt[guru.id];
                                    
                                    return (
                                        <div key={guru.id} className="bg-slate-50 rounded-xl border border-slate-200 overflow-hidden shadow-sm transition-all hover:border-indigo-300">
                                            {/* Header Card - Clickable */}
                                            <button 
                                                onClick={() => toggleAdminAtt(guru.id)}
                                                className="w-full p-5 flex flex-col items-start bg-white hover:bg-slate-50 transition-colors text-left"
                                            >
                                                <div className="flex justify-between items-start w-full mb-3">
                                                    <div>
                                                        <div className="font-bold text-slate-800 text-lg">{guru.name}</div>
                                                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{guru.title}</div>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <span className={`text-[10px] font-black text-white px-2 py-1 rounded shadow-sm ${colorInfo?.color || 'bg-slate-800'}`}>
                                                            {count} / {TARGET_PERTEMUAN}
                                                        </span>
                                                        <Icon name={`fa-solid fa-chevron-${isExpanded ? 'up' : 'down'} text-slate-400`} />
                                                    </div>
                                                </div>
                                                
                                                <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden mt-2">
                                                    <div className={`h-full transition-all duration-1000 ${pct >= 100 ? 'bg-emerald-500' : 'bg-[#5b51d8]'}`} style={{ width: `${pct}%` }}></div>
                                                </div>
                                                <div className="w-full text-right mt-1.5 text-[10px] font-bold text-slate-400 uppercase tracking-widest">{pct}% Tercapai</div>
                                            </button>

                                            {/* Rincian Riwayat Admin */}
                                            {isExpanded && (
                                                <div className="p-4 border-t border-slate-200 bg-slate-50/50">
                                                    <div className="flex justify-end mb-4">
                                                        <button 
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                setAdminInputGuruId(guru.id);
                                                                setAdminLocation("");
                                                                setAdminPhotoData(null);
                                                            }}
                                                            className="text-[10px] font-black text-white bg-[#5b51d8] hover:bg-indigo-700 px-3 py-2 rounded-lg shadow-sm transition-colors flex items-center gap-2 uppercase tracking-widest"
                                                        >
                                                            <Icon name="fa-solid fa-user-plus" /> Input Absen Manual
                                                        </button>
                                                    </div>

                                                    {logs.length === 0 ? (
                                                        <p className="text-sm text-slate-400 italic text-center py-4 font-medium">Belum ada riwayat bimbingan.</p>
                                                    ) : (
                                                        <ul className="space-y-3">
                                                            {logs.slice().reverse().map((log, i) => (
                                                                <li key={i} className="flex flex-col sm:flex-row gap-4 p-4 bg-white border border-slate-200 rounded-xl shadow-sm">
                                                                    {/* Foto Thumbnail */}
                                                                    <div className="w-full sm:w-24 h-24 bg-slate-100 rounded-lg overflow-hidden shrink-0 border border-slate-200 flex items-center justify-center relative">
                                                                        {log.photo ? (
                                                                            <img src={log.photo} alt="Bukti" className="w-full h-full object-cover" />
                                                                        ) : (
                                                                            <Icon name="fa-solid fa-image text-slate-300 text-2xl" />
                                                                        )}
                                                                        {log.isAdminInput && (
                                                                            <div className="absolute top-1 left-1 bg-[#5b51d8] text-white text-[8px] font-black px-1.5 py-0.5 rounded uppercase shadow-sm">Manual</div>
                                                                        )}
                                                                    </div>
                                                                    {/* Info Detail */}
                                                                    <div className="flex flex-col justify-between flex-grow text-left">
                                                                        <div>
                                                                            <div className="flex justify-between items-start mb-1">
                                                                                <div className="font-bold text-slate-700 text-sm">{new Date(log.timestamp).toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' })}</div>
                                                                                <span className="text-slate-400 text-[10px] font-black bg-slate-100 px-2 py-0.5 rounded">{new Date(log.timestamp).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</span>
                                                                            </div>
                                                                            <div className="text-xs text-slate-500 font-medium mt-1 flex flex-wrap items-center gap-1.5 leading-relaxed">
                                                                                <span className="flex items-center gap-1">
                                                                                    <Icon name="fa-solid fa-location-dot text-rose-500" /> 
                                                                                    {log.location || 'Lokasi tidak dicantumkan'}
                                                                                </span>
                                                                                {log.isAdminInput && (
                                                                                    <span className="text-[8px] font-black bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded border border-indigo-100 uppercase tracking-widest whitespace-nowrap ml-1">
                                                                                        <Icon name="fa-solid fa-user-shield mr-1" /> Diinput Koord.
                                                                                    </span>
                                                                                )}
                                                                            </div>
                                                                        </div>
                                                                        {/* Tombol Hapus Admin */}
                                                                        <div className="mt-3 text-right">
                                                                            <button 
                                                                                onClick={() => handleDeleteLog(guru.id, log.id || log.timestamp)}
                                                                                className="text-[10px] font-bold text-rose-500 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg border border-rose-100 transition-colors"
                                                                            >
                                                                                <Icon name="fa-solid fa-trash-can mr-1" /> Batalkan Absen Ini
                                                                            </button>
                                                                        </div>
                                                                    </div>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            // Tampilan Khusus Guru
            const myLogs = attendanceData[appUser.id]?.logs || [];
            const count = myLogs.length;
            const pct = Math.min(Math.round((count / TARGET_PERTEMUAN) * 100), 100);

            return (
                <div className="space-y-6 animate-in fade-in pb-24">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100 text-center">
                        <h2 className="text-2xl font-black text-slate-800 mb-2">Presensi Kehadiran Pembimbing</h2>
                        <p className="text-sm text-slate-500 mb-8 font-medium">Wajib diisi setiap selesai melaksanakan bimbingan tatap muka sebagai bukti administrasi vakasi.</p>
                        
                        {!showForm ? (
                            <button 
                                onClick={() => setShowForm(true)}
                                className="w-full max-w-sm h-16 rounded-2xl shadow-lg mx-auto flex items-center justify-center transition-all bg-gradient-to-r from-indigo-600 to-[#5b51d8] text-white hover:scale-105 active:scale-95 cursor-pointer pulse-active"
                            >
                                <Icon name="fa-solid fa-fingerprint text-2xl mr-3" />
                                <span className="font-black tracking-widest uppercase text-sm">Isi Kehadiran Hari Ini</span>
                            </button>
                        ) : (
                            <div className="max-w-md mx-auto bg-slate-50 p-6 rounded-2xl border border-slate-200 text-left animate-in slide-in-from-top-4 shadow-sm">
                                <h4 className="font-black text-indigo-700 mb-4 flex items-center gap-2"><Icon name="fa-solid fa-camera-retro" /> Form Bukti Kehadiran</h4>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Lokasi & Materi Pembimbingan</label>
                                        <input 
                                            type="text" 
                                            placeholder="Contoh: Lab IPA - Bimbingan Termodinamika" 
                                            className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#5b51d8] outline-none text-sm font-medium"
                                            value={location}
                                            onChange={e => setLocation(e.target.value)}
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Upload Bukti Foto (Selfie / Suasana)</label>
                                        
                                        <input 
                                            type="file" 
                                            accept="image/*" 
                                            capture="environment"
                                            ref={fileInputRef}
                                            onChange={(e) => handleImageUpload(e, setPhotoData)}
                                            className="hidden"
                                        />
                                        
                                        <div className="flex gap-3 items-center">
                                            <button 
                                                onClick={() => fileInputRef.current.click()}
                                                className="flex-1 bg-white border-2 border-dashed border-indigo-200 text-indigo-600 hover:bg-indigo-50 font-bold py-3 rounded-xl flex items-center justify-center gap-2 text-xs transition-colors"
                                            >
                                                <Icon name="fa-solid fa-camera" /> Ambil / Pilih Foto
                                            </button>
                                            
                                            {photoData && (
                                                <div className="w-12 h-12 rounded-lg overflow-hidden border border-slate-200 shrink-0 shadow-sm relative group">
                                                    <img src={photoData} alt="Preview" className="w-full h-full object-cover" />
                                                    <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <Icon name="fa-solid fa-check text-white" />
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="flex gap-3 mt-6 pt-4 border-t border-slate-200">
                                        <button 
                                            onClick={() => {setShowForm(false); setPhotoData(null); setLocation("");}}
                                            className="flex-1 bg-white border border-slate-300 text-slate-600 font-bold py-3 rounded-xl text-xs uppercase tracking-widest hover:bg-slate-50 transition-colors"
                                        >
                                            Batal
                                        </button>
                                        <button 
                                            onClick={handleAbsen}
                                            disabled={isSubmitting || !location || !photoData}
                                            className={`flex-1 font-bold py-3 rounded-xl text-xs uppercase tracking-widest transition-all ${isSubmitting || !location || !photoData ? 'bg-slate-300 text-slate-500 cursor-not-allowed shadow-none' : 'bg-[#5b51d8] text-white hover:bg-indigo-700 shadow-md shadow-indigo-500/30'}`}
                                        >
                                            {isSubmitting ? 'Mengirim...' : 'Kirim Absen'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-black text-slate-800 text-lg">Progres Target Bimbingan</h3>
                            <span className="font-black text-indigo-600 text-xl">{count} <span className="text-sm text-slate-400">/ {TARGET_PERTEMUAN}</span></span>
                        </div>
                        <div className="h-4 w-full bg-slate-100 rounded-full overflow-hidden shadow-inner mb-2">
                            <div className="h-full bg-emerald-500 transition-all duration-1000" style={{ width: `${pct}%` }}></div>
                        </div>
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest text-center">{pct}% Tercapai dari Target Sekolah</p>

                        <div className="mt-8 text-left">
                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 border-b pb-2">Riwayat Kehadiran Bapak/Ibu</h4>
                            {myLogs.length === 0 ? (
                                <p className="text-sm text-slate-400 italic text-center py-6 font-medium">Belum ada riwayat mengajar tercatat.</p>
                            ) : (
                                <ul className="space-y-3">
                                    {myLogs.slice().reverse().map((log, i) => (
                                        <li key={i} className="flex flex-col sm:flex-row gap-4 p-4 bg-slate-50 border border-slate-200 rounded-xl relative overflow-hidden">
                                            <div className="w-full sm:w-20 h-20 bg-slate-200 rounded-lg overflow-hidden shrink-0 border border-slate-300 relative">
                                                {log.photo ? (
                                                    <img src={log.photo} alt="Bukti" className="w-full h-full object-cover" />
                                                ) : (
                                                    <div className="w-full h-full flex items-center justify-center"><Icon name="fa-solid fa-image text-slate-400 text-2xl" /></div>
                                                )}
                                            </div>
                                            <div className="flex flex-col justify-between flex-grow">
                                                <div>
                                                    <div className="flex justify-between items-start mb-1">
                                                        <div className="font-bold text-slate-700 text-sm">{new Date(log.timestamp).toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
                                                        <span className="text-slate-400 text-[10px] font-black">{new Date(log.timestamp).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</span>
                                                    </div>
                                                    <div className="text-xs text-slate-500 font-medium mt-1 flex flex-wrap items-center gap-1.5 leading-relaxed">
                                                        <span className="flex items-center gap-1">
                                                            <Icon name="fa-solid fa-location-dot text-rose-500" /> 
                                                            {log.location || 'Lokasi tidak dicantumkan'}
                                                        </span>
                                                        {log.isAdminInput && (
                                                            <span className="text-[8px] font-black bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded border border-indigo-100 uppercase tracking-widest whitespace-nowrap ml-1">
                                                                <Icon name="fa-solid fa-user-shield mr-1" /> Diinput Koord.
                                                            </span>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="mt-3 text-right z-10">
                                                    <button 
                                                        onClick={() => handleDeleteLog(appUser.id, log.id || log.timestamp)}
                                                        className="text-[10px] font-bold text-rose-500 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded border border-rose-100 transition-colors"
                                                    >
                                                        <Icon name="fa-solid fa-xmark mr-1" /> Hapus / Batal
                                                    </button>
                                                </div>
                                            </div>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // KOMPONEN: DASHBOARD (STATISTIK)
        // ==========================================
        const Dashboard = ({ progressData, activeField }) => {
          const filteredStudents = useMemo(() => {
            return activeField === 'ALL' ? DELEGASI : DELEGASI.filter(s => s.field === activeField);
          }, [activeField]);

          const stats = useMemo(() => {
            let counts = { aman: 0, pendalaman: 0, belum: 0, total: 0 };
            filteredStudents.forEach(student => {
              const studentSyllabus = SYLLABUS_DB[student.field];
              counts.total += studentSyllabus.length;
              const pData = progressData[student.id] || {};
              studentSyllabus.forEach(topic => {
                const statData = pData[topic.id];
                const statusVal = typeof statData === 'object' ? (statData.status || 'belum') : (statData || 'belum');
                if (counts[statusVal] !== undefined) counts[statusVal]++;
              });
            });
            return counts;
          }, [progressData, filteredStudents]);

          const fieldAverages = useMemo(() => {
            return FIELDS.filter(f => f.id !== 'ALL').map(field => {
              const studentsInField = DELEGASI.filter(s => s.field === field.id);
              let totalFieldScore = 0;
              let validStudentCount = 0;
              studentsInField.forEach(student => {
                 const pData = progressData[student.id] || {};
                 const stStats = getStudentStats(pData);
                 if (stStats.avgScore > 0) {
                   totalFieldScore += stStats.avgScore;
                   validStudentCount++;
                 }
              });
              const avgScore = validStudentCount > 0 ? Math.round(totalFieldScore / validStudentCount) : 0;
              return { ...field, avgScore, labelShort: field.id };
            });
          }, [progressData]);

          const warningStudents = useMemo(() => {
            return filteredStudents.map(student => {
              const pData = progressData[student.id] || {};
              const stStats = getStudentStats(pData);
              return { ...student, ...stStats };
            }).filter(s => s.belumCount >= 3 || (s.avgScore > 0 && s.avgScore < 60) || s.pendalamanCount >= 2);
          }, [filteredStudents, progressData]);

          const pctAman = stats.total > 0 ? Math.round((stats.aman / stats.total) * 100) : 0;
          const pctPendalaman = stats.total > 0 ? Math.round((stats.pendalaman / stats.total) * 100) : 0;
          const pctBelum = stats.total > 0 ? Math.round((stats.belum / stats.total) * 100) : 100;

          return (
            <div className="space-y-6">
              <div className="flex justify-end">
                <button className="bg-[#16a34a] hover:bg-emerald-700 text-white px-4 py-2.5 rounded-lg text-sm font-bold shadow-md flex items-center gap-2 transition-all">
                  <Icon name="fa-solid fa-file-csv" /> Unduh Laporan (CSV)
                </button>
              </div>

              {/* CARD ANALISIS VISUAL */}
              <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div className="flex flex-col lg:flex-row gap-12">
                    {/* Distribusi Penguasaan (Kiri) */}
                    <div className="flex-1">
                        <div className="flex items-center gap-3 mb-8 text-[#5b51d8]">
                            <Icon name="fa-solid fa-chart-pie text-xl" />
                            <h3 className="text-lg font-black text-slate-800 uppercase tracking-tight">Analisis Visual Kesiapan</h3>
                        </div>
                        <div className="mb-6">
                            <h4 className="text-sm font-bold text-slate-700 mb-1">Distribusi Penguasaan Silabus</h4>
                            <p className="text-xs text-slate-400 font-medium">Total {stats.total} Materi Pokok</p>
                        </div>
                        <div className="h-10 w-full flex rounded-xl overflow-hidden bg-slate-100 shadow-inner mb-6">
                            <div style={{ width: `${pctAman}%` }} className="bg-emerald-500 transition-all duration-1000"></div>
                            <div style={{ width: `${pctPendalaman}%` }} className="bg-amber-500 transition-all duration-1000"></div>
                            <div style={{ width: `${pctBelum}%` }} className="bg-rose-500 transition-all duration-1000"></div>
                        </div>
                        <div className="flex flex-wrap gap-4 text-[11px] font-bold text-slate-500">
                            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-emerald-500"></div> Aman ({pctAman}%)</div>
                            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-amber-500"></div> Pendalaman ({pctPendalaman}%)</div>
                            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-rose-500"></div> Belum Dikuasai ({pctBelum}%)</div>
                        </div>
                    </div>

                    {/* Grafik Batang Skor (Kanan) */}
                    <div className="flex-1">
                        <div className="mb-4">
                            <h4 className="text-sm font-bold text-slate-700 mb-1">Rata-rata Skor Latihan per Bidang</h4>
                            <p className="text-xs text-slate-400 font-medium">Skala 0 - 100</p>
                        </div>
                        <div className="relative h-48 mt-10">
                            <div className="absolute inset-0 flex flex-col justify-between pointer-events-none">
                                <div className="chart-grid-line"></div>
                                <div className="chart-grid-line"></div>
                                <div className="chart-grid-line"></div>
                                <div className="chart-grid-line" style={{ borderTop: '2px solid #e2e8f0' }}></div>
                            </div>
                            <div className="relative h-full flex items-end justify-between px-2 gap-1.5 md:gap-3">
                                {fieldAverages.map(f => (
                                    <div key={f.id} className="flex flex-col items-center flex-1 group">
                                        <div className="w-full max-w-[35px] rounded-t-sm transition-all duration-1000 shadow-sm"
                                             style={{ height: `${Math.max(f.avgScore, 4)}%`, backgroundColor: f.hex }}>
                                        </div>
                                        <span className="text-[10px] font-black text-slate-400 mt-3 uppercase tracking-tighter">{f.labelShort}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
              </div>

              {/* TIGA KARTU STATUS (BAWAH) */}
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 pt-4">
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 border-l-[6px] border-l-emerald-500 flex flex-col justify-between relative overflow-hidden">
                      <div className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Aman</div>
                      <div className="flex flex-col">
                        <span className="text-5xl font-black text-slate-800">{pctAman}%</span>
                        <span className="text-[10px] text-slate-400 mt-2 font-bold uppercase">{stats.aman} dari {stats.total} Materi Pokok</span>
                      </div>
                      <div className="absolute top-6 right-6 text-emerald-500 bg-emerald-50 w-8 h-8 rounded-full flex items-center justify-center border border-emerald-100"><Icon name="fa-solid fa-check text-sm" /></div>
                  </div>
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 border-l-[6px] border-l-amber-500 flex flex-col justify-between relative overflow-hidden">
                      <div className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Pendalaman</div>
                      <div className="flex flex-col">
                        <span className="text-5xl font-black text-slate-800">{pctPendalaman}%</span>
                        <span className="text-[10px] text-slate-400 mt-2 font-bold uppercase">{stats.pendalaman} dari {stats.total} Materi Pokok</span>
                      </div>
                      <div className="absolute top-6 right-6 text-amber-500 bg-amber-50 w-8 h-8 rounded-full flex items-center justify-center border border-amber-100"><Icon name="fa-solid fa-question text-sm" /></div>
                  </div>
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 border-l-[6px] border-l-rose-500 flex flex-col justify-between relative overflow-hidden">
                      <div className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Belum Dikuasai</div>
                      <div className="flex flex-col">
                        <span className="text-5xl font-black text-slate-800">{pctBelum}%</span>
                        <span className="text-[10px] text-slate-400 mt-2 font-bold uppercase">{stats.belum} dari {stats.total} Materi Pokok</span>
                      </div>
                      <div className="absolute top-6 right-6 text-rose-500 bg-rose-50 w-8 h-8 rounded-full flex items-center justify-center border border-rose-100"><Icon name="fa-solid fa-exclamation text-sm" /></div>
                  </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // KOMPONEN: CEKLIS & LOGBOOK
        // ==========================================
        const TopicCard = ({ student, topic, currentData, onSave, canEdit }) => {
          const [isExpanded, setIsExpanded] = useState(false);
          const status = currentData?.status || currentData || 'belum';
          const [score, setScore] = useState(currentData?.score || '');
          const [duration, setDuration] = useState(currentData?.duration || '');
          const [notes, setNotes] = useState(currentData?.notes || '');
          const hasNotes = score || duration || notes;

          return (
            <div className={`p-4 bg-white rounded-lg border transition-all ${isExpanded ? 'border-indigo-600 shadow-md' : 'border-slate-200'}`}>
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div className="flex items-start gap-3 flex-grow text-left">
                  <Icon name="fa-solid fa-book-bookmark text-indigo-400 mt-1 shrink-0" />
                  <div>
                    <div className="text-sm font-bold text-slate-700">{topic.title}</div>
                  </div>
                </div>
                <div className="flex flex-wrap gap-2 shrink-0">
                  {STATUS_TYPES.map(type => (
                    <button 
                        key={type.id} 
                        onClick={() => canEdit && onSave(student.id, topic.id, { status: type.id, score, duration, notes, updatedAt: new Date().toISOString() })}
                        disabled={!canEdit}
                        className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all ${
                            status === type.id 
                            ? `${type.color} text-white shadow-md` 
                            : `bg-slate-50 text-slate-400 border border-slate-200 ${canEdit ? 'hover:bg-slate-100' : 'opacity-50 cursor-not-allowed'}`
                        }`}
                    >
                      {type.label}
                    </button>
                  ))}
                  <button onClick={() => setIsExpanded(!isExpanded)} className={`px-3 py-1.5 rounded-lg text-[10px] font-black border transition-all ${isExpanded || hasNotes ? 'bg-indigo-50 text-indigo-600 border-indigo-200' : 'bg-white text-slate-500 border-slate-200'}`}>
                    <Icon name="fa-regular fa-comment-dots mr-1" /> Logbook
                  </button>
                </div>
              </div>

              {isExpanded && (
                <div className="mt-4 pt-4 border-t border-slate-100 space-y-3 animate-in slide-in-from-top-2 text-left">
                  <div className="grid grid-cols-2 gap-4">
                    <div className="space-y-1">
                        <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Durasi (Jam)</label>
                        <input type="number" disabled={!canEdit} placeholder="Jam" className={`w-full p-2.5 bg-slate-50 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none ${!canEdit && 'opacity-60 cursor-not-allowed'}`} value={duration} onChange={e => setDuration(e.target.value)} />
                    </div>
                    <div className="space-y-1">
                        <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Skor Latihan</label>
                        <input type="text" disabled={!canEdit} placeholder="Skor" className={`w-full p-2.5 bg-slate-50 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none ${!canEdit && 'opacity-60 cursor-not-allowed'}`} value={score} onChange={e => setScore(e.target.value)} />
                    </div>
                  </div>
                  <div className="space-y-1">
                      <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Kendala / Catatan</label>
                      <textarea disabled={!canEdit} placeholder="Tulis kesulitan santri di sini..." className={`w-full p-3 bg-slate-50 border rounded-lg text-sm resize-none focus:ring-2 focus:ring-indigo-500 outline-none ${!canEdit && 'opacity-60 cursor-not-allowed'}`} rows="2" value={notes} onChange={e => setNotes(e.target.value)}></textarea>
                  </div>
                  {canEdit ? (
                      <button onClick={() => { onSave(student.id, topic.id, { status, score, duration, notes, updatedAt: new Date().toISOString() }); setIsExpanded(false); }} className="w-full bg-indigo-600 text-white py-3 rounded-lg text-xs font-black shadow-md hover:bg-indigo-700 transition-colors uppercase tracking-widest mt-2">Simpan Logbook</button>
                  ) : (
                      <div className="text-center text-[10px] font-bold text-rose-500 mt-2 bg-rose-50 p-2 rounded-lg border border-rose-100"><Icon name="fa-solid fa-lock" /> Hanya pembimbing {student.field} yang dapat mengedit data ini.</div>
                  )}
                </div>
              )}
            </div>
          );
        };

        const ChecklistView = ({ progressData, activeField, appUser }) => {
            const [selectedId, setSelectedId] = useState(null);
            const [search, setSearch] = useState("");
            const [hideAman, setHideAman] = useState(false);

            const filtered = DELEGASI.filter(s => (activeField === 'ALL' || s.field === activeField) && s.name.toLowerCase().includes(search.toLowerCase()));

            if (selectedId) {
                const s = DELEGASI.find(x => x.id === selectedId);
                const p = progressData[selectedId] || {};
                const syllabus = hideAman ? SYLLABUS_DB[s.field].filter(t => (p[t.id]?.status || p[t.id]) !== 'aman') : SYLLABUS_DB[s.field];
                
                const canEdit = appUser.role === 'admin' || (appUser.role === 'guru' && appUser.field === s.field);

                return (
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border animate-in slide-in-from-right-4 pb-24">
                        <button onClick={() => setSelectedId(null)} className="text-[#5b51d8] font-bold text-sm mb-6 flex items-center gap-2"><Icon name="fa-solid fa-arrow-left" /> Kembali ke Daftar Siswa</button>
                        
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 border-b border-slate-100 pb-6 gap-4">
                            <div>
                                <h3 className="text-2xl md:text-3xl font-black text-slate-800 mb-2">{s.name}</h3>
                                <p className="text-xs text-slate-400 uppercase font-black tracking-widest">Bidang: {s.field} • Progres Silabus 30 Hari</p>
                            </div>
                            <label className="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 px-4 rounded-xl border border-slate-200 shadow-sm">
                                <input type="checkbox" checked={hideAman} onChange={e => setHideAman(e.target.checked)} className="w-4 h-4 text-indigo-600 rounded" />
                                <span className="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Sembunyikan Aman</span>
                            </label>
                        </div>

                        {!canEdit && (
                            <div className="bg-amber-50 border border-amber-200 text-amber-800 p-4 rounded-xl mb-6 text-xs font-bold flex items-center gap-3">
                                <Icon name="fa-solid fa-eye text-lg text-amber-500" />
                                Mode Baca: Bapak/Ibu hanya bisa melihat progres karena siswa ini berada di bidang {s.field}.
                            </div>
                        )}

                        <div className="space-y-4">
                            {syllabus.length === 0 ? (
                                <div className="text-center py-10 text-slate-400 font-bold text-sm"><Icon name="fa-solid fa-check-double text-4xl mb-3 text-emerald-400 block mx-auto" /> Semua materi sudah berstatus Aman!</div>
                            ) : (
                                syllabus.map(t => <TopicCard key={t.id} student={s} topic={t} currentData={p[t.id]} canEdit={canEdit} onSave={async (sid, tid, d) => await setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'progress', sid), { ...progressData[sid], [tid]: d })} />)
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="space-y-6 pb-24">
                    <div className="relative">
                        <Icon name="fa-solid fa-magnifying-glass" className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400" />
                        <input type="text" placeholder="Cari nama siswa..." className="w-full p-4 pl-12 rounded-2xl border border-slate-200 shadow-sm focus:ring-2 focus:ring-[#5b51d8] outline-none text-sm font-bold text-slate-700" value={search} onChange={e => setSearch(e.target.value)} />
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        {filtered.map(s => (
                            <button key={s.id} onClick={() => setSelectedId(s.id)} className="bg-white p-5 rounded-2xl border border-slate-100 hover:border-[#5b51d8] text-left transition-all group shadow-sm">
                                <div className="flex justify-between items-start mb-3">
                                    <span className={`text-white text-[9px] px-2.5 py-1 rounded font-black uppercase tracking-widest ${FIELDS.find(f => f.id === s.field).color}`}>{s.field}</span>
                                    <Icon name="fa-solid fa-chevron-right text-slate-200 group-hover:text-[#5b51d8] transition-all" />
                                </div>
                                <div className="font-bold text-slate-800 text-sm group-hover:text-[#5b51d8]">{s.name}</div>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const IssuesView = ({ progressData }) => {
          const [expandedGroups, setExpandedGroups] = useState({});

          const groupedIssues = useMemo(() => {
            const groups = [];
            DELEGASI.forEach(s => {
              const p = progressData[s.id] || {};
              const studentIssues = [];
              
              Object.keys(p).forEach(tid => {
                if (p[tid]?.notes && p[tid].notes.trim() !== '') {
                  studentIssues.push({
                    topicId: tid,
                    data: p[tid],
                    title: SYLLABUS_DB[s.field]?.find(x => x.id === tid)?.title || `Materi ${tid}`
                  });
                }
              });

              if (studentIssues.length > 0) {
                studentIssues.sort((a,b) => new Date(b.data.updatedAt) - new Date(a.data.updatedAt));
                groups.push({
                  student: s,
                  issues: studentIssues,
                  latestUpdate: studentIssues[0].data.updatedAt
                });
              }
            });
            return groups.sort((a,b) => new Date(b.latestUpdate) - new Date(a.latestUpdate));
          }, [progressData]);

          const toggleExpand = (studentId) => {
            setExpandedGroups(prev => ({ ...prev, [studentId]: !prev[studentId] }));
          };

          return (
            <div className="bg-white p-6 md:p-8 rounded-2xl border border-slate-100 shadow-sm pb-24">
              <div className="flex items-center justify-between border-b border-slate-100 pb-6 mb-6">
                  <div className="flex items-center gap-3">
                      <Icon name="fa-regular fa-comments text-2xl text-indigo-600" />
                      <h3 className="font-black text-slate-800 text-xl tracking-tight">Inbox Kendala Pembelajaran</h3>
                  </div>
                  <div className="hidden sm:block bg-slate-100 text-slate-600 font-bold px-3 py-1.5 rounded-lg text-[10px] uppercase tracking-widest">
                      Total: {groupedIssues.reduce((acc, curr) => acc + curr.issues.length, 0)} Laporan
                  </div>
              </div>

              {groupedIssues.length === 0 ? (
                  <p className="text-center py-16 text-slate-400 text-sm italic font-medium">Belum ada catatan kendala dari pembimbing.</p>
              ) : (
                <div className="space-y-4 text-left">
                    {groupedIssues.map((group) => {
                        const isExpanded = expandedGroups[group.student.id];
                        const fieldColor = FIELDS.find(f => f.id === group.student.field)?.color || 'bg-slate-800';

                        return (
                            <div key={group.student.id} className="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all hover:border-[#5b51d8] shadow-sm">
                                <button 
                                    onClick={() => toggleExpand(group.student.id)} 
                                    className="w-full p-4 flex items-center justify-between bg-white hover:bg-slate-50 transition-colors"
                                >
                                    <div className="flex items-center gap-3 overflow-hidden text-left">
                                        <span className={`text-[9px] text-white px-2 py-1 rounded font-black uppercase tracking-widest shrink-0 ${fieldColor}`}>
                                            {group.student.field}
                                        </span>
                                        <div className="font-bold text-slate-800 text-sm md:text-base truncate">{group.student.name}</div>
                                    </div>
                                    <div className="flex items-center gap-3 shrink-0 ml-2">
                                        <span className="text-[10px] font-bold bg-rose-100 text-rose-600 px-2.5 py-1 rounded-lg border border-rose-200 shadow-sm whitespace-nowrap">
                                            {group.issues.length} Kendala
                                        </span>
                                        <Icon name={`fa-solid fa-chevron-${isExpanded ? 'up' : 'down'} text-slate-400 transition-transform`} />
                                    </div>
                                </button>

                                {isExpanded && (
                                    <div className="p-4 border-t border-slate-200 space-y-3 bg-slate-50/50 animate-in slide-in-from-top-2">
                                        {group.issues.map((iss, i) => (
                                            <div key={i} className="p-4 bg-white border border-slate-200 rounded-xl shadow-sm">
                                                <div className="flex justify-between items-start mb-2 gap-4">
                                                    <div className="text-xs font-black text-[#5b51d8] leading-tight">{iss.title}</div>
                                                    <span className="text-slate-400 text-[9px] font-bold uppercase tracking-widest shrink-0 bg-slate-100 border border-slate-200 px-2 py-0.5 rounded">
                                                        {new Date(iss.data.updatedAt).toLocaleDateString('id-ID', { day:'numeric', month:'short' })}
                                                    </span>
                                                </div>
                                                <p className="text-sm italic text-slate-600 leading-relaxed font-medium">"{iss.data.notes}"</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
              )}
            </div>
          );
        };

        const LeaderboardView = ({ progressData }) => {
          const ranked = DELEGASI.map(s => ({ ...s, ...getStudentStats(progressData[s.id] || {}) }))
                                .sort((a, b) => b.avgScore - a.avgScore || b.totalDuration - a.totalDuration);
          return (
            <div className="bg-white p-4 md:p-6 rounded-2xl border border-slate-100 shadow-sm pb-24">
              <div className="flex items-center gap-3 border-b border-slate-100 pb-6 mb-6">
                  <Icon name="fa-solid fa-trophy text-2xl text-amber-500" />
                  <h3 className="font-black text-slate-800 text-xl tracking-tight">Papan Peringkat</h3>
              </div>
              <div className="space-y-3">
                {ranked.map((s, i) => (
                    <div key={s.id} className={`flex items-center justify-between p-3 md:p-4 rounded-xl border transition-all ${i < 3 ? 'bg-indigo-50/40 border-indigo-100' : 'bg-white border-slate-100'}`}>
                        <div className="flex items-center gap-3 md:gap-4 overflow-hidden">
                            <span className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-black shadow-sm shrink-0 ${i === 0 ? 'bg-yellow-400 text-white' : i === 1 ? 'bg-slate-300 text-slate-700' : i === 2 ? 'bg-amber-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{i+1}</span>
                            <div className="overflow-hidden text-left">
                                <div className="text-xs md:text-sm font-bold text-slate-800 truncate">{s.name}</div>
                                <div className="text-[8px] md:text-[9px] text-slate-400 uppercase font-black tracking-tighter">{s.field} • {s.totalDuration} JAM BELAJAR</div>
                            </div>
                        </div>
                        <div className="flex flex-col items-end shrink-0 ml-2">
                            <span className="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest">Avg Skor</span>
                            <span className="text-base md:text-lg font-black text-indigo-600">{s.avgScore}</span>
                        </div>
                    </div>
                ))}
              </div>
            </div>
          );
        };

        const DownloadsView = ({ showAlert }) => (
            <div className="bg-white p-4 md:p-6 rounded-2xl border space-y-6 shadow-sm pb-20">
                <div className="flex items-center gap-3 border-b pb-4">
                  <Icon name="fa-solid fa-cloud-arrow-down text-2xl text-indigo-600" />
                  <h3 className="font-black text-slate-800 text-xl tracking-tight">Unduhan & Referensi</h3>
                </div>
                <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                    {[
                      { t: "Buku Pedoman OSN 2026", i: "fa-file-pdf text-rose-500", s: "2.4 MB" }, 
                      { t: "Silabus Seluruh Bidang", i: "fa-file-pdf text-rose-500", s: "1.8 MB" },
                      { t: "Arsip Soal Matematika", i: "fa-file-zipper text-amber-500", s: "15 MB" }, 
                      { t: "Arsip Soal IPA (BIO/FIS/KIM)", i: "fa-file-zipper text-amber-500", s: "42 MB" },
                      { t: "Arsip Soal IPS (EKO/GEO)", i: "fa-file-zipper text-amber-500", s: "28 MB" },
                      { t: "Strategi OSN (YouTube)", i: "fa-brands fa-youtube text-red-500", s: "Link" }
                    ].map((d, i) => (
                        <div key={i} className="p-4 bg-slate-50 border border-slate-200 rounded-xl hover:border-indigo-600 hover:bg-white transition-all cursor-pointer group text-left shadow-sm" onClick={() => showAlert("Fitur unduhan file nyata akan segera diaktifkan!")}>
                            <Icon name={`fa-solid ${d.i} text-3xl mb-4 block`} />
                            <div className="text-xs md:text-sm font-bold text-slate-800 group-hover:text-indigo-600">{d.t}</div>
                            <div className="text-[10px] font-bold text-slate-400 mt-1 uppercase">{d.s}</div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // ==========================================
        // APP MAIN WRAPPER
        // ==========================================
        const App = () => {
          // Authentication & Data State
          const [firebaseUser, setFirebaseUser] = useState(null);
          const [appUser, setAppUser] = useState(null); // User profil dari login screen
          const [progressData, setProgressData] = useState({});
          const [attendanceData, setAttendanceData] = useState({});
          const [loading, setLoading] = useState(true);
          const [modalConfig, setModalConfig] = useState(null); // <-- TAMBAHAN UNTUK MODAL
          
          // UI State
          const [activeTab, setActiveTab] = useState('dashboard');
          const [activeField, setActiveField] = useState('ALL');
          const [sidebarOpen, setSidebarOpen] = useState(false);

          // Helper untuk memanggil Popup cantik kita
          const showAlert = (message) => setModalConfig({ type: 'alert', message });
          const showConfirm = (message, onConfirm) => setModalConfig({ type: 'confirm', message, onConfirm });

          // 1. Firebase Anonymous Auth Initializer
          useEffect(() => {
            signInAnonymously(auth).catch(console.error);
            return onAuthStateChanged(auth, setFirebaseUser);
          }, []);

          // 2. Data Listeners (Progress & Attendance)
          useEffect(() => {
            if (!firebaseUser) return;
            
            const unsubProgress = onSnapshot(query(collection(db, 'artifacts', appIdStr, 'public', 'data', 'progress')), (snap) => {
              const d = {}; snap.forEach(doc => d[doc.id] = doc.data());
              setProgressData(d);
            });

            const unsubAttendance = onSnapshot(query(collection(db, 'artifacts', appIdStr, 'public', 'data', 'attendance')), (snap) => {
              const d = {}; snap.forEach(doc => d[doc.id] = doc.data());
              setAttendanceData(d);
              setLoading(false);
            });

            return () => { unsubProgress(); unsubAttendance(); };
          }, [firebaseUser]);

          // Tampilkan loading spinner jika belum connect
          if (loading) return (
            <div className="min-h-screen flex flex-col items-center justify-center text-slate-400 bg-white p-6">
                <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4 shadow-lg shadow-indigo-100"></div>
                <p className="font-black text-slate-500 animate-pulse text-sm uppercase tracking-widest">Menghubungkan Server MANJ Prestisius...</p>
            </div>
          );

          // Tampilkan Login Screen jika belum login
          if (!appUser) {
              return <LoginScreen onLogin={setAppUser} />;
          }

          // Main App UI (Setelah Login)
          return (
            <div className="min-h-screen flex flex-col md:flex-row overflow-hidden bg-slate-50">
              
              {/* MODAL / ALERT CUSTOM KITA MUNCUL DI SINI */}
              <CustomModal config={modalConfig} onClose={() => setModalConfig(null)} />

              {/* BACKDROP MOBILE */}
              {sidebarOpen && <div className="fixed inset-0 bg-slate-950/80 z-40 md:hidden animate-in fade-in" onClick={() => setSidebarOpen(false)}></div>}

              {/* SIDEBAR */}
              <div className={`fixed inset-y-0 left-0 w-64 bg-[#0f172a] text-white flex flex-col z-50 sidebar-transition transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 shadow-2xl`}>
                <div className="p-8 flex flex-col items-start gap-4 border-b border-white/5">
                  <div className="flex items-center gap-3">
                    <div className="w-12 h-12 rounded-xl p-1 bg-white/5 border border-white/10 flex items-center justify-center shrink-0">
                        <img src="LOGO_MANJ.png" alt="Logo" className="w-full h-full object-contain" onError={e => {e.target.style.display='none'; e.target.nextSibling.style.display='block';}} />
                        <span className="hidden font-black text-2xl text-amber-500">NJ</span>
                    </div>
                    <div>
                        <div className="font-black text-base tracking-tighter leading-none">MONITORING OSN</div>
                        <div className="text-[10px] text-amber-500 font-black uppercase tracking-widest mt-1">MA Nurul Jadid</div>
                    </div>
                  </div>
                </div>

                <nav className="flex-grow mt-8 px-4 space-y-2 overflow-y-auto scrollbar-hide pb-20">
                  <div className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] px-4 mb-4">Menu Utama</div>
                  <button onClick={() => { setActiveTab('dashboard'); setSidebarOpen(false); }} className={`w-full flex items-center gap-4 p-3.5 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-[#5b51d8] text-white shadow-lg shadow-indigo-500/20' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                    <Icon name="fa-solid fa-table-cells-large text-lg" /> <span className="font-bold text-sm">Dashboard</span>
                  </button>
                  <button onClick={() => { setActiveTab('checklist'); setSidebarOpen(false); }} className={`w-full flex items-center gap-4 p-3.5 rounded-xl transition-all ${activeTab === 'checklist' ? 'bg-[#5b51d8] text-white shadow-lg shadow-indigo-500/20' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                    <Icon name="fa-solid fa-square-check text-lg" /> <span className="font-bold text-sm">Update Progres</span>
                  </button>
                  <button onClick={() => { setActiveTab('attendance'); setSidebarOpen(false); }} className={`w-full flex items-center gap-4 p-3.5 rounded-xl transition-all ${activeTab === 'attendance' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-500/20' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                    <Icon name="fa-solid fa-fingerprint text-lg" /> <span className="font-bold text-sm">Absensi Guru</span>
                  </button>
                  
                  <div className="pt-8">
                     <div className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] px-4 mb-4">Analisis & Referensi</div>
                     <button onClick={() => { setActiveTab('issues'); setSidebarOpen(false); }} className={`w-full flex items-center gap-4 p-3.5 rounded-xl transition-all ${activeTab === 'issues' ? 'bg-[#5b51d8] text-white shadow-lg shadow-indigo-500/20' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                       <Icon name="fa-solid fa-comments text-lg" /> <span className="font-bold text-sm">Pusat Kendala</span>
                     </button>
                     <button onClick={() => { setActiveTab('leaderboard'); setSidebarOpen(false); }} className={`w-full flex items-center gap-4 p-3.5 rounded-xl transition-all ${activeTab === 'leaderboard' ? 'bg-[#5b51d8] text-white shadow-lg shadow-indigo-500/20' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                       <Icon name="fa-solid fa-trophy text-lg" /> <span className="font-bold text-sm">Peringkat Siswa</span>
                     </button>
                  </div>
                </nav>

                <div className="p-6 border-t border-white/5 absolute bottom-0 w-full bg-[#0f172a]">
                  <div className="flex items-center justify-between bg-white/5 p-3 rounded-2xl border border-white/10 group cursor-pointer hover:bg-white/10 transition-colors" onClick={() => setAppUser(null)}>
                    <div className="flex items-center gap-3">
                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-xs text-white shadow-inner uppercase ${appUser.role === 'admin' ? 'bg-[#5b51d8]' : 'bg-emerald-600'}`}>{appUser.name.charAt(0)}</div>
                        <div className="overflow-hidden text-left">
                            <div className="font-black text-xs truncate text-white">{appUser.name}</div>
                            <div className="text-[9px] text-amber-500 uppercase font-black tracking-widest leading-none mt-1">{appUser.title}</div>
                        </div>
                    </div>
                    <Icon name="fa-solid fa-right-from-bracket text-slate-400 group-hover:text-rose-400 text-sm" />
                  </div>
                </div>
              </div>

              {/* MOBILE TOP BAR */}
              <div className="md:hidden bg-[#0f172a] text-white p-4 sticky top-0 z-40 flex items-center justify-between shadow-lg border-b border-white/5">
                 <div className="flex items-center gap-3 px-4 py-3">
                  <button onClick={() => setSidebarOpen(true)} className="w-9 h-9 flex items-center justify-center bg-white/10 rounded-lg border border-white/10 shrink-0"><Icon name="fa-solid fa-bars" size={16} /></button>
                  <div className="w-8 h-8 shrink-0 bg-white/10 rounded-lg p-1 flex items-center justify-center overflow-hidden">
                    <img src="LOGO_MANJ.png" alt="Logo MANJ" className="w-full h-full object-contain" onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/100x100/f59e0b/0f172a?text=NJ"; }} />
                  </div>
                  <div className="leading-tight flex-grow overflow-hidden text-left">
                    <div className="font-black text-xs text-white tracking-wide truncate">MONITORING OSN</div>
                    <div className="text-[9px] text-amber-500 font-bold uppercase tracking-widest mt-0.5">MA Nurul Jadid</div>
                  </div>
                  <div className="flex items-center gap-1.5 bg-emerald-500/20 border border-emerald-500/30 px-2 py-1 rounded-full shrink-0">
                    <span className="relative flex h-1.5 w-1.5"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-emerald-500"></span></span>
                    <span className="text-[9px] font-bold text-emerald-400">Live</span>
                  </div>
                </div>
              </div>

              {/* MAIN CONTENT */}
              <div className="flex-grow ml-0 md:ml-64 p-4 md:p-12 w-full min-w-0">
                <div className="h-14 md:hidden"></div> {/* Spacer Mobile Header */}
                
                <header className="mb-10 flex flex-col gap-6">
                  <div className="flex flex-col lg:flex-row lg:items-start justify-between gap-4">
                    <div className="text-left">
                      <h1 className="text-3xl md:text-5xl font-black text-slate-900 tracking-tight leading-none uppercase">
                        {activeTab === 'dashboard' ? 'PUSAT KENDALI PROGRES' : activeTab === 'checklist' ? 'PEMBARUAN SILABUS' : activeTab === 'issues' ? 'MONITORING KENDALA' : activeTab === 'leaderboard' ? 'PERINGKAT DELEGASI' : 'ABSENSI GURU'}
                      </h1>
                      <p className="text-slate-500 font-bold text-xs md:text-sm mt-3 uppercase tracking-widest opacity-80">Masa Persiapan OSN-K 2026 • MA Nurul Jadid</p>
                    </div>
                    <div className="hidden md:flex bg-white px-4 py-2 rounded-full border border-emerald-100 text-[10px] md:text-xs font-black text-slate-600 items-center gap-2 shadow-sm self-start pulse-active">
                        <span className="w-2.5 h-2.5 bg-emerald-500 rounded-full"></span> Real-time Monitoring Active
                    </div>
                  </div>

                  {activeTab !== 'attendance' && (
                  <div className="flex items-center gap-2 overflow-x-auto pb-4 scrollbar-hide">
                      <div className="flex items-center gap-2 text-slate-400 text-[10px] font-black uppercase tracking-widest pr-2 border-r shrink-0">
                        <Icon name="fa-solid fa-filter" /> Filter
                      </div>
                      {FIELDS.map(f => (
                        <button key={f.id} onClick={() => setActiveField(f.id)} className={`shrink-0 px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all shadow-sm ${activeField === f.id ? `bg-slate-800 text-white ring-2 ring-offset-2 ring-slate-200` : 'bg-white text-slate-500 border border-slate-200 hover:border-[#5b51d8]'}`}>
                            {f.label}
                        </button>
                      ))}
                  </div>
                  )}
                </header>

                <main className="max-w-[1400px] mx-auto pb-24 md:pb-12">
                    {activeTab === 'dashboard' && <Dashboard progressData={progressData} activeField={activeField} />}
                    {activeTab === 'checklist' && <ChecklistView appUser={appUser} progressData={progressData} activeField={activeField} />}
                    {activeTab === 'issues' && <IssuesView progressData={progressData} />}
                    {activeTab === 'leaderboard' && <LeaderboardView progressData={progressData} />}
                    {activeTab === 'attendance' && <AttendanceView appUser={appUser} attendanceData={attendanceData} setAttendanceData={setAttendanceData} showAlert={showAlert} showConfirm={showConfirm} />}
                    {activeTab === 'downloads' && <DownloadsView showAlert={showAlert} />}
                </main>
              </div>

              {/* MOBILE BOTTOM NAVIGATION */}
              <div className="md:hidden fixed bottom-0 left-0 w-full bg-slate-900 z-30 border-t border-white/10" style={{ paddingBottom: 'env(safe-area-inset-bottom, 8px)' }}>
                <div className="flex items-center justify-around px-1 pt-2 pb-1">
                  {[
                    { tab: 'dashboard',   icon: 'fa-solid fa-table-cells-large', label: 'Home' },
                    { tab: 'checklist',   icon: 'fa-solid fa-square-check',      label: 'Progres'   },
                    { tab: 'attendance',  icon: 'fa-solid fa-fingerprint',       label: 'Absen'   },
                    { tab: 'issues',      icon: 'fa-solid fa-comments',          label: 'Kendala'   },
                    { tab: 'leaderboard', icon: 'fa-solid fa-trophy',            label: 'Peringkat' },
                  ].map(item => (
                    <button key={item.tab} onClick={() => setActiveTab(item.tab)} className={`flex flex-col items-center gap-1 px-3 py-2 min-w-0 flex-1 rounded-xl transition-colors ${activeTab === item.tab ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>
                      <Icon name={item.icon} size={activeTab === item.tab ? 20 : 18} />
                      <span className={`text-[9px] font-bold leading-tight ${activeTab === item.tab ? 'text-white' : 'text-slate-500'}`}>{item.label}</span>
                    </button>
                  ))}
                </div>
              </div>

            </div>
          );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
