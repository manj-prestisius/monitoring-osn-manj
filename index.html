          { id: 'ALL', label: 'Semua Bidang', color: 'bg-slate-800' },
          { id: 'MAT', label: 'Matematika', color: 'bg-blue-600' },
          { id: 'BIO', label: 'Biologi', color: 'bg-green-600' },
          { id: 'FIS', label: 'Fisika', color: 'bg-purple-600' },
          { id: 'KIM', label: 'Kimia', color: 'bg-pink-600' },
          { id: 'EKO', label: 'Ekonomi', color: 'bg-amber-600' },
          { id: 'GEO', label: 'Geografi', color: 'bg-teal-600' },
        ];

        const STATUS_TYPES = [
          { id: 'aman', label: 'Aman', color: 'bg-emerald-500', hex: '#10b981', icon: <Icon name="fa-solid fa-circle-check" /> },
          { id: 'pendalaman', label: 'Pendalaman', color: 'bg-amber-500', hex: '#f59e0b', icon: <Icon name="fa-solid fa-circle-question" /> },
          { id: 'belum', label: 'Belum Dikuasai', color: 'bg-rose-500', hex: '#ef4444', icon: <Icon name="fa-solid fa-circle-exclamation" /> },
        ];

        // --- HELPERS ---
        const parseScore = (scoreStr) => {
          if (!scoreStr) return 0;
          const str = String(scoreStr).trim();
          if (str.includes('/')) {
            const [num, den] = str.split('/');
            const n = Number(num), d = Number(den);
            return (d === 0 || isNaN(n) || isNaN(d)) ? 0 : (n / d) * 100;
          }
          const val = Number(str);
          return isNaN(val) ? 0 : val;
        };

        const getStudentStats = (studentProg) => {
          let totalDuration = 0, totalScore = 0, scoreCount = 0, belumCount = 0, pendalamanCount = 0;
          Object.values(studentProg).forEach(data => {
            const status = typeof data === 'object' ? (data.status || 'belum') : (data || 'belum');
            const dur = typeof data === 'object' ? Number(data.duration) : 0;
            const score = typeof data === 'object' ? data.score : '';
            if (status === 'belum') belumCount++;
            if (status === 'pendalaman') pendalamanCount++;
            if (dur && !isNaN(dur)) totalDuration += dur;
            if (score) { totalScore += parseScore(score); scoreCount++; }
          });
          return { totalDuration, avgScore: scoreCount > 0 ? Math.round(totalScore / scoreCount) : 0, belumCount, pendalamanCount };
        };

        // --- COMPONENTS ---

        const Dashboard = ({ progressData, activeField }) => {
          const filteredStudents = useMemo(() => activeField === 'ALL' ? DELEGASI : DELEGASI.filter(s => s.field === activeField), [activeField]);
          
          const stats = useMemo(() => {
            let counts = { aman: 0, pendalaman: 0, belum: 0, total: 0 };
            filteredStudents.forEach(student => {
              const syllabus = SYLLABUS_DB[student.field];
              counts.total += syllabus.length;
              const pData = progressData[student.id] || {};
              syllabus.forEach(topic => {
                const stat = typeof pData[topic.id] === 'object' ? pData[topic.id].status : pData[topic.id] || 'belum';
                if (counts[stat] !== undefined) counts[stat]++;
              });
            });
            return counts;
          }, [progressData, filteredStudents]);

          const warningStudents = useMemo(() => {
            return filteredStudents.map(student => {
              const stats = getStudentStats(progressData[student.id] || {});
              return { ...student, ...stats };
            }).filter(s => s.belumCount >= 3 || (s.avgScore > 0 && s.avgScore < 60) || s.pendalamanCount >= 2);
          }, [filteredStudents, progressData]);

          const fieldAverages = useMemo(() => {
            if (activeField !== 'ALL') return [];
            return FIELDS.filter(f => f.id !== 'ALL').map(field => {
              const students = DELEGASI.filter(s => s.field === field.id);
              let sum = 0, count = 0;
              students.forEach(s => {
                const st = getStudentStats(progressData[s.id] || {});
                if (st.avgScore > 0) { sum += st.avgScore; count++; }
              });
              return { ...field, avgScore: count > 0 ? Math.round(sum / count) : 0 };
            });
          }, [progressData, activeField]);

          const pctAman = stats.total > 0 ? (stats.aman / stats.total) * 100 : 0;
          const pctPendalaman = stats.total > 0 ? (stats.pendalaman / stats.total) * 100 : 0;
          const pctBelum = stats.total > 0 ? (stats.belum / stats.total) * 100 : 100;

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-slate-100">
                <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                  <Icon name="fa-solid fa-chart-pie" className="text-indigo-600" /> 
                  Analisis Visual Kesiapan
                </h3>
                <div className={`flex flex-col ${activeField === 'ALL' ? 'md:flex-row' : ''} gap-8`}>
                    <div className="flex flex-col justify-center flex-1">
                        <div className="h-8 w-full flex rounded-lg overflow-hidden shadow-inner bg-slate-100 mb-4">
                            <div style={{ width: `${pctAman}%` }} className="bg-emerald-500 transition-all duration-1000"></div>
                            <div style={{ width: `${pctPendalaman}%` }} className="bg-amber-500 transition-all duration-1000"></div>
                            <div style={{ width: `${pctBelum}%` }} className="bg-rose-500 transition-all duration-1000"></div>
                        </div>
                        <div className="flex flex-wrap gap-4 text-[10px] md:text-xs font-bold text-slate-600">
                            <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-emerald-500"></div> Aman ({Math.round(pctAman)}%)</div>
                            <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-amber-500"></div> Pendalaman ({Math.round(pctPendalaman)}%)</div>
                            <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-rose-500"></div> Belum ({Math.round(pctBelum)}%)</div>
                        </div>
                        <div className="mt-8 flex justify-center">
                            <div className="w-40 h-40 md:w-56 md:h-56 rounded-full border-[12px] md:border-[16px] border-slate-50" 
                                 style={{ background: `conic-gradient(#10b981 0% ${pctAman}%, #f59e0b ${pctAman}% ${pctAman + pctPendalaman}%, #ef4444 ${pctAman + pctPendalaman}% 100%)` }}>
                            </div>
                        </div>
                    </div>
                    {activeField === 'ALL' && (
                        <div className="border-t pt-8 md:border-t-0 md:border-l md:pt-0 border-slate-100 md:pl-8 flex flex-col flex-1">
                            <div className="h-40 flex items-end justify-between gap-1 md:gap-2 relative">
                                {fieldAverages.map(field => (
                                    <div key={field.id} className="flex flex-col items-center flex-1 group z-10 relative">
                                        <div className={`w-full max-w-[30px] rounded-t-sm transition-all duration-1000 ${field.color} shadow-sm`}
                                             style={{ height: `${Math.max(field.avgScore, 2)}%` }}>
                                             {field.avgScore > 20 && <span className="text-white text-[9px] font-black block text-center mt-1">{field.avgScore}</span>}
                                        </div>
                                        <span className="text-[9px] font-bold text-slate-500 mt-2">{field.id}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
              </div>

              {warningStudents.length > 0 && (
                <div className="bg-rose-50 border border-rose-200 rounded-xl p-4 shadow-sm">
                  <h3 className="text-rose-700 font-bold text-sm md:text-base mb-4 flex items-center gap-2">
                    <Icon name="fa-regular fa-bell animate-bounce" /> 
                    Sistem Peringatan Dini: Siswa Perlu Perhatian Khusus
                  </h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                    {warningStudents.map(s => (
                      <div key={s.id} className="bg-white p-3 rounded-lg border border-rose-100 flex flex-col justify-between">
                        <div>
                          <div className="font-bold text-slate-800 text-xs md:text-sm">{s.name}</div>
                          <div className="text-[10px] text-slate-500 uppercase">{s.field}</div>
                        </div>
                        <div className="mt-2 text-[10px] font-medium text-rose-600 space-y-1">
                          {s.belumCount >= 3 && <div>• {s.belumCount} materi menumpuk (Belum)</div>}
                          {s.pendalamanCount >= 2 && <div>• {s.pendalamanCount} materi butuh (Pendalaman)</div>}
                          {(s.avgScore > 0 && s.avgScore < 60) && <div>• Rata-rata skor rendah ({s.avgScore})</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                {STATUS_TYPES.map(type => (
                  <div key={type.id} className="bg-white p-4 rounded-xl shadow-sm border-l-4" style={{ borderColor: type.hex }}>
                    <div className="flex justify-between items-center">
                      <span className="text-slate-500 font-bold uppercase text-[10px] tracking-wider">{type.label}</span>
                      <div style={{ color: type.hex }}>{type.icon}</div>
                    </div>
                    <div className="text-3xl font-black mt-2 text-slate-800">{stats.total > 0 ? Math.round((stats[type.id] / stats.total) * 100) : 0}%</div>
                    <div className="text-[10px] text-slate-400 mt-1">{stats[type.id]} dari {stats.total} Materi</div>
                  </div>
                ))}
              </div>

              <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                <h3 className="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
                  <Icon name="fa-solid fa-users-viewfinder" className="text-indigo-600" /> Progres Individu
                </h3>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                  {filteredStudents.map(student => {
                    const st = getStudentStats(progressData[student.id] || {});
                    const syllabusLen = SYLLABUS_DB[student.field].length;
                    const amanCount = Object.values(progressData[student.id] || {}).filter(v => (v.status || v) === 'aman').length;
                    const pct = Math.round((amanCount / syllabusLen) * 100);
                    const color = FIELDS.find(f => f.id === student.field)?.color;

                    return (
                      <div key={student.id} className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <div className="flex justify-between items-start mb-2">
                          <div className="flex items-center gap-2">
                            <span className={`text-[9px] text-white px-1.5 py-0.5 rounded font-bold ${color}`}>{student.field}</span>
                            <div className="font-bold text-slate-800 text-xs md:text-sm">{student.name}</div>
                          </div>
                          <span className="text-sm font-black">{pct}%</span>
                        </div>
                        <div className="h-2 w-full bg-slate-200 rounded-full overflow-hidden flex">
                            <div className="h-full bg-emerald-500" style={{ width: `${pct}%` }}></div>
                        </div>
                        <div className="flex gap-4 mt-2 text-[9px] font-bold text-slate-500">
                            <span><Icon name="fa-regular fa-clock" /> {st.totalDuration} Jam</span>
                            <span><Icon name="fa-solid fa-award" /> Avg: {st.avgScore}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        };

        const TopicCard = ({ studentId, topic, currentData, onSave }) => {
          const [isExpanded, setIsExpanded] = useState(false);
          const status = currentData?.status || currentData || 'belum';
          const [score, setScore] = useState(currentData?.score || '');
          const [duration, setDuration] = useState(currentData?.duration || '');
          const [notes, setNotes] = useState(currentData?.notes || '');
          const hasNotes = score || duration || notes;
          const [day, name] = topic.title.split(': ');

          return (
            <div className={`p-3 md:p-4 bg-white rounded-lg border transition-all md:ml-4 ${isExpanded ? 'border-indigo-600 shadow-md' : 'border-slate-200'}`}>
              <div className="flex flex-col xl:flex-row xl:items-center justify-between gap-3">
                <div className="flex items-start gap-2 flex-grow">
                  <Icon name="fa-solid fa-book-bookmark text-indigo-400 mt-1 hidden sm:block" />
                  <div><span className="font-black text-indigo-700 text-xs">{day}:</span> <span className="text-xs font-medium">{name}</span></div>
                </div>
                <div className="flex flex-wrap gap-1.5 shrink-0">
                  {STATUS_TYPES.map(type => (
                    <button key={type.id} onClick={() => onSave(studentId, topic.id, { status: type.id, score, duration, notes, updatedAt: new Date().toISOString() })}
                      className={`flex-1 sm:flex-none px-2 py-1.5 rounded text-[10px] font-bold transition-all ${status === type.id ? `${type.color} text-white shadow-md` : 'bg-slate-50 text-slate-400 border border-slate-200'}`}>
                      {type.label}
                    </button>
                  ))}
                  <button onClick={() => setIsExpanded(!isExpanded)} className={`px-2 py-1.5 rounded text-[10px] font-bold border transition-all ${isExpanded || hasNotes ? 'bg-indigo-50 text-indigo-600 border-indigo-200' : 'bg-white text-slate-500'}`}>
                    <Icon name="fa-regular fa-comment-dots mr-1" /> Logbook <Icon name={`fa-solid fa-chevron-${isExpanded ? 'up' : 'down'} ml-1`} />
                  </button>
                </div>
              </div>
              {isExpanded && (
                <div className="mt-3 pt-3 border-t border-slate-100 space-y-3">
                  <div className="grid grid-cols-2 gap-3">
                    <input type="number" placeholder="Jam" className="p-2 bg-slate-50 border rounded text-xs" value={duration} onChange={e => setDuration(e.target.value)} />
                    <input type="text" placeholder="Skor" className="p-2 bg-slate-50 border rounded text-xs" value={score} onChange={e => setScore(e.target.value)} />
                  </div>
                  <textarea placeholder="Kendala..." className="w-full p-2 bg-slate-50 border rounded text-xs resize-none" rows="2" value={notes} onChange={e => setNotes(e.target.value)}></textarea>
                  <button onClick={() => { onSave(studentId, topic.id, { status, score, duration, notes, updatedAt: new Date().toISOString() }); setIsExpanded(false); }} className="w-full bg-indigo-600 text-white py-2 rounded text-xs font-bold shadow-md">Simpan Logbook</button>
                </div>
              )}
            </div>
          );
        };

        const ChecklistView = ({ progressData, activeField, user }) => {
          const [selectedId, setSelectedId] = useState(null);
          const [search, setSearch] = useState("");
          const [hideAman, setHideAman] = useState(false);

          const filtered = DELEGASI.filter(s => (activeField === 'ALL' || s.field === activeField) && s.name.toLowerCase().includes(search.toLowerCase()));

          if (selectedId) {
            const student = DELEGASI.find(s => s.id === selectedId);
            const pData = progressData[selectedId] || {};
            const syllabus = hideAman ? SYLLABUS_DB[student.field].filter(t => (pData[t.id]?.status || pData[t.id]) !== 'aman') : SYLLABUS_DB[student.field];
            const grouped = syllabus.reduce((acc, t) => { if(!acc[t.cat]) acc[t.cat] = []; acc[t.cat].push(t); return acc; }, {});

            return (
              <div className="animate-in slide-in-from-right-4">
                <button onClick={() => setSelectedId(null)} className="text-indigo-600 font-bold text-sm mb-4"><Icon name="fa-solid fa-arrow-left" /> Kembali</button>
                <div className="bg-white p-4 rounded-xl shadow-sm">
                  <div className="flex justify-between items-start mb-6 border-b pb-4">
                    <div>
                        <div className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mb-1">OSN {student.field}</div>
                        <h3 className="text-xl font-black text-slate-800">{student.name}</h3>
                    </div>
                    <label className="flex items-center gap-2 cursor-pointer bg-slate-50 p-2 rounded border border-slate-200">
                        <input type="checkbox" checked={hideAman} onChange={e => setHideAman(e.target.checked)} className="w-3 h-3 text-indigo-600" />
                        <span className="text-[10px] font-bold">Sembunyikan Aman</span>
                    </label>
                  </div>
                  <div className="space-y-8">
                    {Object.keys(grouped).map(cat => (
                      <div key={cat} className="space-y-2">
                        <h4 className="text-[10px] font-bold uppercase text-slate-400 border-l-4 border-indigo-600 pl-2 ml-4">{cat}</h4>
                        <div className="grid gap-2">
                          {grouped[cat].map(t => <TopicCard key={t.id} studentId={student.id} topic={t} currentData={pData[t.id]} onSave={async (sid, tid, d) => await setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'progress', sid), { ...progressData[sid], [tid]: d })} />)}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="space-y-4">
              <input type="text" placeholder="Cari nama siswa..." className="w-full p-3 rounded-xl border focus:ring-2 focus:ring-indigo-600 outline-none text-sm font-medium" value={search} onChange={e => setSearch(e.target.value)} />
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                {filtered.map(s => (
                  <button key={s.id} onClick={() => setSelectedId(s.id)} className="bg-white p-4 rounded-xl border hover:border-indigo-600 text-left transition-all group">
                    <div className="flex justify-between items-start mb-2">
                        <span className={`${FIELDS.find(f => f.id === s.field).color} text-white text-[9px] px-2 py-0.5 rounded font-bold`}>{s.field}</span>
                        <Icon name="fa-solid fa-chevron-right text-slate-300 group-hover:text-indigo-600" />
                    </div>
                    <div className="font-bold text-slate-800 text-sm group-hover:text-indigo-600">{s.name}</div>
                  </button>
                ))}
              </div>
            </div>
          );
        };

        const IssuesView = ({ progressData }) => {
          const issues = [];
          DELEGASI.forEach(s => {
            const p = progressData[s.id] || {};
            Object.keys(p).forEach(tid => {
              if (p[tid]?.notes) issues.push({ student: s, topicId: tid, data: p[tid] });
            });
          });
          return (
            <div className="bg-white p-4 rounded-xl border space-y-4">
              <h3 className="font-black text-slate-800 flex items-center gap-2"><Icon name="fa-regular fa-comments text-indigo-600" /> Pusat Kendala</h3>
              {issues.length === 0 ? <p className="text-center py-10 text-slate-400 text-sm">Belum ada kendala tercatat.</p> : 
                <div className="grid gap-3">
                    {issues.map((iss, i) => (
                        <div key={i} className="p-3 bg-slate-50 border rounded-lg">
                            <div className="flex justify-between text-[10px] font-bold mb-1">
                                <span className="text-indigo-600 uppercase">{iss.student.name} ({iss.student.field})</span>
                                <span className="text-slate-400">{new Date(iss.data.updatedAt).toLocaleDateString()}</span>
                            </div>
                            <p className="text-xs italic text-slate-600">"{iss.data.notes}"</p>
                        </div>
                    ))}
                </div>
              }
            </div>
          );
        };

        const LeaderboardView = ({ progressData }) => {
          const ranked = DELEGASI.map(s => ({ ...s, ...getStudentStats(progressData[s.id] || {}) })).sort((a, b) => b.avgScore - a.avgScore);
          return (
            <div className="bg-white p-4 rounded-xl border space-y-4">
              <h3 className="font-black text-slate-800 flex items-center gap-2"><Icon name="fa-solid fa-trophy text-indigo-600" /> Papan Peringkat</h3>
              <div className="space-y-2">
                {ranked.map((s, i) => (
                    <div key={s.id} className={`flex items-center justify-between p-3 rounded-lg border ${i < 3 ? 'bg-indigo-50/50' : 'bg-white'}`}>
                        <div className="flex items-center gap-3">
                            <span className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black ${i === 0 ? 'bg-yellow-400 text-white' : 'bg-slate-100 text-slate-400'}`}>{i+1}</span>
                            <span className="text-xs font-bold">{s.name}</span>
                        </div>
                        <span className="text-sm font-black text-indigo-600">{s.avgScore}</span>
                    </div>
                ))}
              </div>
            </div>
          );
        };

        const DownloadsView = () => (
            <div className="bg-white p-4 rounded-xl border space-y-6">
                <h3 className="font-black text-slate-800 flex items-center gap-2"><Icon name="fa-solid fa-cloud-arrow-down text-indigo-600" /> Unduhan & Referensi</h3>
                <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                    {[{ t: "Buku Pedoman OSN 2026", i: "fa-file-pdf text-rose-500" }, { t: "Bank Soal Matematika", i: "fa-file-zipper text-amber-500" }, { t: "Strategi OSN (YouTube)", i: "fa-brands fa-youtube text-red-500" }].map((d, i) => (
                        <div key={i} className="p-4 bg-slate-50 border rounded-xl hover:border-indigo-600 transition-all cursor-pointer" onClick={() => alert("Membuka file...")}>
                            <Icon name={`fa-solid ${d.i} text-2xl mb-3`} />
                            <div className="text-xs font-bold">{d.t}</div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- APP MAIN ---
        const App = () => {
          const [user, setUser] = useState(null);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [activeField, setActiveField] = useState('ALL');
          const [progressData, setProgressData] = useState({});
          const [loading, setLoading] = useState(true);

          useEffect(() => {
            signInAnonymously(auth).catch(console.error);
            return onAuthStateChanged(auth, setUser);
          }, []);

          useEffect(() => {
            if (!user) return;
            return onSnapshot(query(collection(db, 'artifacts', appIdStr, 'public', 'data', 'progress')), (snap) => {
              const d = {}; snap.forEach(doc => d[doc.id] = doc.data());
              setProgressData(d); setLoading(false);
            });
          }, [user]);

          if (loading) return (
            <div className="min-h-screen flex flex-col items-center justify-center text-slate-400">
                <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p className="font-bold animate-pulse text-sm">Menghubungkan ke server MANJ Prestisius...</p>
            </div>
          );

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row pb-20 md:pb-0">
              {/* DESKTOP SIDEBAR */}
              <div className="hidden md:flex w-64 bg-[#0f172a] text-white flex-col fixed h-full z-20 shadow-xl">
                <div className="p-6 flex items-center gap-4">
                  <div className="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-[#0f172a] font-black text-xl">NJ</div>
                  <div className="leading-tight">
                    <div className="font-black text-xs tracking-widest text-white uppercase">Monitoring OSN</div>
                    <div className="text-[10px] text-amber-500 font-bold uppercase tracking-wider">MA Nurul Jadid</div>
                  </div>
                </div>
                <nav className="flex-grow mt-6 px-3 space-y-2 overflow-y-auto scrollbar-hide pb-20">
                  <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-4 p-3 rounded-lg transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}><Icon name="fa-solid fa-chart-line" /> <span className="font-bold text-sm">Dashboard</span></button>
                  <button onClick={() => setActiveTab('checklist')} className={`w-full flex items-center gap-4 p-3 rounded-lg transition-all ${activeTab === 'checklist' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}><Icon name="fa-solid fa-list-check" /> <span className="font-bold text-sm">Update</span></button>
                  <button onClick={() => setActiveTab('issues')} className={`w-full flex items-center gap-4 p-3 rounded-lg transition-all ${activeTab === 'issues' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}><Icon name="fa-regular fa-comment" /> <span className="font-bold text-sm">Kendala</span></button>
                  <button onClick={() => setActiveTab('leaderboard')} className={`w-full flex items-center gap-4 p-3 rounded-lg transition-all ${activeTab === 'leaderboard' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}><Icon name="fa-solid fa-trophy" /> <span className="font-bold text-sm">Peringkat</span></button>
                  <button onClick={() => setActiveTab('downloads')} className={`w-full flex items-center gap-4 p-3 rounded-lg transition-all ${activeTab === 'downloads' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}><Icon name="fa-solid fa-download" /> <span className="font-bold text-sm">Unduhan</span></button>
                </nav>
                <div className="p-4 border-t border-white/10 bg-[#0f172a] absolute bottom-0 w-full">
                  <div className="flex items-center gap-3 bg-white/5 p-3 rounded-xl">
                    <div className="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-xs uppercase">A</div>
                    <div className="overflow-hidden"><div className="font-bold text-xs truncate">Al Basyir</div><div className="text-[9px] text-amber-500 uppercase font-black">Koordinator</div></div>
                  </div>
                </div>
              </div>

              {/* MOBILE HEADER */}
              <div className="md:hidden bg-[#0f172a] text-white p-4 sticky top-0 z-40 flex items-center justify-between shadow-md">
                 <div className="flex items-center gap-3">
                    <div className="w-8 h-8 bg-amber-500 rounded flex items-center justify-center text-[#0f172a] font-black">NJ</div>
                    <div className="font-black text-xs tracking-tighter">MONITORING OSN</div>
                 </div>
                 <div className="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-[10px] font-bold">A</div>
              </div>

              {/* MAIN CONTENT */}
              <div className="flex-grow md:ml-64 p-4 md:p-10 w-full overflow-x-hidden">
                <header className="mb-6 md:mb-8">
                  <div className="flex flex-col md:flex-row md:items-start justify-between gap-4 mb-6">
                    <div>
                      <h1 className="text-2xl md:text-4xl font-black text-slate-800 tracking-tight uppercase">
                        {activeTab === 'dashboard' ? 'Pusat Kendali Progres' : activeTab === 'checklist' ? 'Pembaruan Silabus' : activeTab === 'issues' ? 'Monitoring Kendala' : activeTab === 'leaderboard' ? 'Peringkat Delegasi' : 'Pusat Referensi'}
                      </h1>
                      <p className="text-[10px] md:text-sm text-slate-500 font-bold uppercase mt-1 tracking-widest">Masa Persiapan OSN-K 2026 • MA Nurul Jadid</p>
                    </div>
                    <div className="flex bg-white px-3 py-1.5 rounded-full border border-slate-200 text-[9px] md:text-xs font-bold text-slate-600 items-center gap-2 self-start animate-blink">
                        <span className="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_10px_#10b981]"></span> Real-time Monitoring Active
                    </div>
                  </div>
                  {activeTab !== 'downloads' && (
                    <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                      {FIELDS.map(f => (
                        <button key={f.id} onClick={() => setActiveField(f.id)} className={`shrink-0 px-3 py-2 rounded-full text-[9px] font-black uppercase transition-all ${activeField === f.id ? `${f.color} text-white shadow-md scale-105` : 'bg-white text-slate-500 border'}`}>{f.label}</button>
                      ))}
                    </div>
                  )}
                </header>

                {activeTab === 'dashboard' && <Dashboard progressData={progressData} activeField={activeField} />}
                {activeTab === 'checklist' && <ChecklistView user={user} progressData={progressData} activeField={activeField} />}
                {activeTab === 'issues' && <IssuesView progressData={progressData} />}
                {activeTab === 'leaderboard' && <LeaderboardView progressData={progressData} activeField={activeField} />}
                {activeTab === 'downloads' && <DownloadsView />}
              </div>

              {/* MOBILE BOTTOM NAV */}
              <nav className="md:hidden fixed bottom-0 left-0 w-full bg-[#0f172a] text-slate-500 flex justify-around items-center z-50 pb-safe border-t border-slate-800 h-16">
                <button onClick={() => setActiveTab('dashboard')} className={`p-2 transition-all ${activeTab === 'dashboard' ? 'text-indigo-500 scale-110' : ''}`}><Icon name="fa-solid fa-house" size={20} /></button>
                <button onClick={() => setActiveTab('checklist')} className={`p-2 transition-all ${activeTab === 'checklist' ? 'text-indigo-500 scale-110' : ''}`}><Icon name="fa-solid fa-list-check" size={20} /></button>
                <button onClick={() => setActiveTab('issues')} className={`p-2 transition-all ${activeTab === 'issues' ? 'text-indigo-500 scale-110' : ''}`}><Icon name="fa-regular fa-comments" size={20} /></button>
                <button onClick={() => setActiveTab('leaderboard')} className={`p-2 transition-all ${activeTab === 'leaderboard' ? 'text-indigo-500 scale-110' : ''}`}><Icon name="fa-solid fa-trophy" size={20} /></button>
                <button onClick={() => setActiveTab('downloads')} className={`p-2 transition-all ${activeTab === 'downloads' ? 'text-indigo-500 scale-110' : ''}`}><Icon name="fa-solid fa-cloud-arrow-down" size={20} /></button>
              </nav>
            </div>
          );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
