        const SYLLABUS_DB = {

          BIO: Array.from({length: 30}, (_, i) => ({ id: `b${i+1}`, cat: 'Syllabus', title: `Day ${i+1}: Materi Biologi Hari Ke-${i+1}` })),

        const STATUS_TYPES = [
          { id: 'aman', label: 'Aman', color: 'bg-emerald-500', hex: '#10b981', icon: <Icon name="fa-solid fa-circle-check" /> },
          { id: 'pendalaman', label: 'Pendalaman', color: 'bg-amber-500', hex: '#f59e0b', icon: <Icon name="fa-solid fa-circle-question" /> },
          { id: 'belum', label: 'Belum Dikuasai', color: 'bg-rose-500', hex: '#ef4444', icon: <Icon name="fa-solid fa-circle-exclamation" /> },
        ];

        const getStudentStats = (studentProg) => {
          let totalDuration = 0, totalScore = 0, scoreCount = 0, belumCount = 0, pendalamanCount = 0;
          Object.values(studentProg).forEach(data => {
            const status = typeof data === 'object' ? (data.status || 'belum') : (data || 'belum');
            const dur = typeof data === 'object' ? Number(data.duration) : 0;
            const score = typeof data === 'object' ? data.score : '';
            if (status === 'belum') belumCount++;
            if (status === 'pendalaman') pendalamanCount++;
            if (dur && !isNaN(dur)) totalDuration += dur;
            if (score) {
              const str = String(score).trim();
              let val = 0;
              if (str.includes('/')) {
                const [n, d] = str.split('/'); val = (Number(n)/Number(d))*100;
              } else { val = Number(str); }
              if(!isNaN(val)) { totalScore += val; scoreCount++; }
            }
          });
          return { totalDuration, avgScore: scoreCount > 0 ? Math.round(totalScore / scoreCount) : 0, belumCount, pendalamanCount };
        };

        // ==========================================
        // CUSTOM MODAL COMPONENT (PENGGANTI ALERT BROWSER)
        // ==========================================
        const CustomModal = ({ config, onClose }) => {
            if (!config) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center p-4 animate-in fade-in">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 text-center animate-in zoom-in-95 duration-200 border border-slate-100">

                        </div>

                            {config.type === 'confirm' ? 'Konfirmasi Tindakan' : 'Informasi'}
                        </h3>
                        <p className="text-sm font-medium text-slate-500 mb-6 leading-relaxed px-2">
                            {config.message}
                        </p>
                        <div className="flex gap-3 justify-center">
                            {config.type === 'confirm' && (
                                <button onClick={onClose} className="flex-1 py-3 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors uppercase tracking-widest text-xs">

                                </button>
                            )}
                            <button 
                                onClick={() => {
                                    if (config.onConfirm) config.onConfirm();

                                className={`flex-1 py-3 rounded-xl font-bold text-white transition-all uppercase tracking-widest text-xs shadow-md hover:shadow-lg ${config.type === 'confirm' ? 'bg-rose-500 hover:bg-rose-600 shadow-rose-500/30' : 'bg-[#5b51d8] hover:bg-indigo-700 shadow-indigo-500/30'}`}
                            >
                                {config.type === 'confirm' ? 'Ya, Lanjutkan' : 'Mengerti'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // LOGIN SCREEN
        // ==========================================
        const LoginScreen = ({ onLogin }) => {
            const [selectedUser, setSelectedUser] = useState(APP_USERS[0].id);
            const [pin, setPin] = useState("");
            const [error, setError] = useState("");

            const handleLogin = (e) => {
                e.preventDefault();
                const user = APP_USERS.find(u => u.id === selectedUser);
                if (user && user.pin === pin) {
                    onLogin(user);
                } else {
                    setError("PIN yang Anda masukkan salah.");
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200 animate-in">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 bg-slate-900 rounded-2xl mx-auto mb-4 flex items-center justify-center p-2 shadow-lg">

        // ==========================================
        // KOMPONEN: ABSENSI GURU (DENGAN FOTO & EDIT)
        // ==========================================
        const AttendanceView = ({ appUser, attendanceData, setAttendanceData, showAlert, showConfirm }) => {
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showForm, setShowForm] = useState(false);
            const [location, setLocation] = useState("");
            const [photoData, setPhotoData] = useState(null);
            const fileInputRef = useRef(null);

            // STATE & REF UNTUK ADMIN INPUT MANUAL
            const [adminInputGuruId, setAdminInputGuruId] = useState(null);
            const [adminLocation, setAdminLocation] = useState("");
            const [adminPhotoData, setAdminPhotoData] = useState(null);
            const adminFileInputRef = useRef(null);

            // Fitur Kompresi Gambar untuk menjaga database tetap ringan
            const handleImageUpload = (e, setPhotoState) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 500; // Kompresi kuat ke ukuran kecil
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.6); // Kualitas 60%
                        setPhotoState(dataUrl);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            // Fungsi Absen Oleh Guru (Self Service)
            const handleAbsen = async () => {
                if (appUser.role !== 'guru') return;
                if (!location.trim()) { showAlert("Mohon isi lokasi/materi pembimbingan."); return; }
                if (!photoData) { showAlert("Mohon unggah foto bukti kegiatan."); return; }

                setIsSubmitting(true);
                const now = new Date();
                const existingLogs = attendanceData[appUser.id]?.logs || [];
                
                const newLog = { 
                    id: Date.now().toString(),
                    timestamp: now.toISOString(),
                    location: location,
                    photo: photoData,
                    isAdminInput: false
                };
                
                try {
                    await setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'attendance', appUser.id), { logs: [...existingLogs, newLog] });
                    showAlert("Absensi berhasil dicatat! Terima kasih.");
                    setShowForm(false);
                    setLocation("");
                    setPhotoData(null);
                } catch (error) {
                    console.error("Gagal absen", error);
                    showAlert("Gagal mengirim data. Cek koneksi internet.");
                }
                setIsSubmitting(false);
            };

            // Fungsi Absen Manual Oleh Koordinator (Admin Override)
            const handleAdminAbsen = async () => {
                if (!adminLocation.trim()) { showAlert("Lokasi & Materi wajib diisi."); return; }
                
                setIsSubmitting(true);
                const now = new Date();
                const existingLogs = attendanceData[adminInputGuruId]?.logs || [];
                
                const newLog = { 
                    id: Date.now().toString(),
                    timestamp: now.toISOString(),
                    location: adminLocation,
                    photo: adminPhotoData || "", // Foto opsional jika diinput admin
                    isAdminInput: true // Penanda khusus inputan koordinator
                };
                
                try {
                    await setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'attendance', adminInputGuruId), { logs: [...existingLogs, newLog] });
                    showAlert("Absensi manual berhasil dicatat ke sistem!");
                    setAdminInputGuruId(null);
                    setAdminLocation("");
                    setAdminPhotoData(null);
                } catch (error) {
                    console.error("Gagal absen manual", error);
                    showAlert("Gagal menyimpan data manual. Cek koneksi internet.");
                }
                setIsSubmitting(false);
            };

            const handleDeleteLog = async (userId, logId) => {
                showConfirm("Apakah Anda yakin ingin membatalkan/menghapus catatan absen ini? Aksi ini tidak dapat dikembalikan.", async () => {
                    const userLogs = attendanceData[userId]?.logs || [];
                    const newLogs = userLogs.filter(l => l.id !== logId && l.timestamp !== logId); 
                    
                    try {
                        await setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'attendance', userId), { logs: newLogs });
                    } catch (error) {
                        console.error("Gagal menghapus", error);
                    }
                });
            };

            // Tampilan Khusus Koordinator (Admin)
            if (appUser.role === 'admin') {
                const guruUsers = APP_USERS.filter(u => u.role === 'guru');
                const [expandedAdminAtt, setExpandedAdminAtt] = useState({});

                const toggleAdminAtt = (guruId) => {
                    setExpandedAdminAtt(prev => ({ ...prev, [guruId]: !prev[guruId] }));
                };
                
                return (
                    <div className="space-y-6 animate-in fade-in pb-20">
                        
                        {/* MODAL INPUT MANUAL ADMIN */}
                        {adminInputGuruId && (
